<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no">
<title>차트 연습</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#131722;color:#d1d4dc;font-family:'Segoe UI',sans-serif;font-size:13px;height:100dvh;overflow:hidden}

/* ── 공통 ── */
.page{display:none;flex-direction:column;height:100dvh;overflow:hidden}
.page.active{display:flex}
input,select,textarea{background:#131722;border:1px solid #2a2e39;color:#d1d4dc;padding:5px 8px;border-radius:4px;font-size:13px;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#2962ff}
textarea{resize:vertical}
button{cursor:pointer;border:none;border-radius:4px;font-size:13px;padding:6px 14px;transition:background .15s}
.btn-primary{background:#2962ff;color:#fff} .btn-primary:hover{background:#1e4fd8}
.btn-ghost{background:#2a2e39;color:#d1d4dc} .btn-ghost:hover{background:#363b4e}
.btn-ok{background:#26a69a;color:#fff} .btn-ok:hover{background:#1d8078}
.btn-danger{background:#e53935;color:#fff} .btn-danger:hover{background:#c62828}
.sep{width:1px;height:22px;background:#2a2e39;flex-shrink:0}
label{color:#787b86;font-size:11px}
.err{color:#ef5350;font-size:12px;margin-top:4px;min-height:16px}
.topnav{background:#1e222d;border-bottom:1px solid #2a2e39;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topnav-title{font-size:15px;font-weight:600;color:#fff}
.spacer{flex:1}
.scroll-y{overflow-y:auto;flex:1}

/* ── Auth ── */
#page-auth{justify-content:center;align-items:center;background:#131722}
.auth-box{background:#1e222d;border:1px solid #2a2e39;border-radius:8px;padding:32px;width:320px}
.auth-box h1{font-size:20px;color:#fff;margin-bottom:20px;text-align:center}
.tab-btns{display:flex;gap:4px;margin-bottom:20px}
.tab-btns button{flex:1;padding:7px;background:#2a2e39;color:#787b86}
.tab-btns button.on{background:#2962ff;color:#fff}
.auth-field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.auth-field label{font-size:12px}

/* ── Home ── */
.home-content{padding:16px;display:flex;flex-direction:column;gap:12px}
.session-card{background:#1e222d;border:1px solid #2a2e39;border-radius:6px;padding:12px 14px;cursor:pointer;transition:border-color .15s}
.session-card:hover{border-color:#2962ff}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.card-ticker{font-size:15px;font-weight:600;color:#fff}
.card-meta{color:#787b86;font-size:11px}
.card-stats{display:flex;gap:12px;font-size:12px}
.stat-correct{color:#26a69a} .stat-wrong{color:#ef5350} .stat-ambig{color:#ffd54f}
.badge{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.badge-active{background:#2962ff22;color:#2962ff}
.badge-ended{background:#2a2e39;color:#787b86}
.new-btn{background:#2962ff;color:#fff;padding:12px;border-radius:6px;font-size:14px;font-weight:600;text-align:center;cursor:pointer}
.new-btn:hover{background:#1e4fd8}
.section-title{font-size:12px;color:#787b86;text-transform:uppercase;letter-spacing:.5px}

/* ── Setup ── */
.setup-content{padding:16px;display:flex;flex-direction:column;gap:14px;max-width:480px;margin:0 auto;width:100%}
.setup-row{display:flex;flex-direction:column;gap:6px}
.setup-row label{font-size:12px;color:#787b86}
.inline-row{display:flex;gap:8px;align-items:center}
.blind-opts{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#preview-info{background:#1e222d;border-radius:4px;padding:10px 12px;font-size:12px;color:#787b86;min-height:38px}

/* ── Practice ── */
.bar{background:#1e222d;border-bottom:1px solid #2a2e39;padding:5px 10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;flex-shrink:0}
.bar:last-child{border-bottom:none;border-top:1px solid #2a2e39}
.tog{background:#2a2e39;border:1px solid transparent;padding:3px 8px;border-radius:3px;cursor:pointer;font-size:11px;color:#787b86}
.tog.on{border-color:currentColor}
.tog.ma5{color:#f48024}.tog.ma20{color:#26c6da}.tog.ma60{color:#ab47bc}
.tog.ma120{color:#ef5350}.tog.ma200{color:#66bb6a}.tog.bb{color:#ffd54f}
.tog.ichi{color:#80cbc4}.tog.vol{color:#90a4ae}.tog.rsi{color:#ff8a65}
.tog.macd{color:#ce93d8}.tog.stoch{color:#80deea}.tog.obv{color:#a5d6a7}
.dtool{background:#2a2e39;border:1px solid transparent;padding:4px 9px;border-radius:3px;cursor:pointer;font-size:12px;color:#d1d4dc}
.dtool:hover{background:#363b4e}.dtool.on{background:#2962ff;border-color:#2962ff}
input[type=color]{width:26px;height:26px;padding:1px;border-radius:3px;border:1px solid #2a2e39;cursor:pointer;background:none}
#chart-area{flex:1;display:flex;flex-direction:column;min-height:0;position:relative}
#main-wrap{flex:1;position:relative;min-height:0}
#main-chart{width:100%;height:100%}
#drawing-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;cursor:crosshair}
.subchart{flex-shrink:0;position:relative;display:none}
.subchart-label{position:absolute;top:4px;left:8px;font-size:10px;color:#787b86;z-index:5;pointer-events:none}
.resize-handle{height:5px;background:#2a2e39;cursor:ns-resize;flex-shrink:0}
.resize-handle:hover,.resize-handle.dragging{background:#2962ff}
#practice-header{background:#1e222d;border-bottom:1px solid #2a2e39;padding:6px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0}
#practice-ticker{font-size:14px;font-weight:600;color:#fff}
#practice-info{font-size:11px;color:#787b86}
#practice-status{font-size:11px;color:#787b86}

/* ── Evaluation Drawer ── */
#eval-drawer{position:fixed;bottom:0;left:0;right:0;background:#1e222d;border-top:2px solid #2962ff;padding:14px 16px;z-index:200;transform:translateY(100%);transition:transform .3s ease}
#eval-drawer.open{transform:translateY(0)}
.eval-title{font-size:13px;font-weight:600;color:#fff;margin-bottom:10px}
.eval-section{margin-bottom:10px}
.eval-section>label{display:block;margin-bottom:5px;color:#787b86;font-size:11px}
.btn-group{display:flex;gap:6px;flex-wrap:wrap}
.eval-btn{background:#2a2e39;color:#d1d4dc;padding:6px 12px;border-radius:4px;border:1px solid transparent}
.eval-btn:hover{background:#363b4e}
.eval-btn.on{border-color:#2962ff;color:#2962ff;background:#2962ff22}
.eval-btn.on-ok{border-color:#26a69a;color:#26a69a;background:#26a69a22}
.eval-btn.on-bad{border-color:#ef5350;color:#ef5350;background:#ef535022}
.eval-row{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
.eval-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}
#eval-post-summary{font-size:12px;color:#787b86;margin-bottom:10px}

/* ── Final Modal ── */
#final-modal{position:fixed;inset:0;background:#000a;z-index:300;display:none;justify-content:center;align-items:center}
#final-modal.open{display:flex}
.modal-box{background:#1e222d;border:1px solid #2a2e39;border-radius:8px;padding:24px;width:340px}
.modal-box h2{font-size:16px;color:#fff;margin-bottom:14px}
.modal-field{margin-bottom:12px;display:flex;flex-direction:column;gap:5px}
.modal-field label{font-size:12px;color:#787b86}
.modal-stats{background:#131722;border-radius:4px;padding:10px;margin-bottom:12px;font-size:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* ── History ── */
.history-content{padding:12px;display:flex;flex-direction:column;gap:8px}

/* ── Detail ── */
.detail-content{padding:14px;display:flex;flex-direction:column;gap:14px}
.detail-meta{background:#1e222d;border-radius:6px;padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.meta-item label{display:block;font-size:10px;color:#787b86}
.meta-item span{font-size:13px;color:#fff}
.reveal-item{background:#1e222d;border-radius:6px;padding:10px 12px;border-left:3px solid #2a2e39}
.reveal-item.correct{border-color:#26a69a}
.reveal-item.wrong{border-color:#ef5350}
.reveal-item.ambig{border-color:#ffd54f}
.reveal-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.reveal-num{font-size:11px;font-weight:600;color:#787b86}
.reveal-tags{display:flex;gap:5px}
.tag{padding:2px 7px;border-radius:3px;font-size:10px;background:#2a2e39;color:#d1d4dc}
.reveal-note{font-size:12px;color:#787b86;margin-top:4px}

/* ── Settings ── */
.settings-content{padding:16px;display:flex;flex-direction:column;gap:16px;max-width:400px}
.settings-section{display:flex;flex-direction:column;gap:8px}
.settings-section h3{font-size:12px;color:#787b86;text-transform:uppercase;letter-spacing:.5px}
.ma-inputs{display:flex;gap:6px;flex-wrap:wrap}
.ma-inputs input{width:56px}
</style>
</head>
<body>

<!-- ══════════ AUTH ══════════ -->
<div id="page-auth" class="page">
  <div class="auth-box">
    <h1>📈 차트 연습</h1>
    <div class="tab-btns">
      <button id="tab-login-btn" class="on" onclick="switchTab('login')">로그인</button>
      <button id="tab-reg-btn" onclick="switchTab('register')">회원가입</button>
    </div>
    <div id="tab-login">
      <div class="auth-field"><label>아이디</label><input id="login-user" type="text" autocomplete="username"></div>
      <div class="auth-field"><label>비밀번호</label><input id="login-pw" type="password" autocomplete="current-password"></div>
      <button class="btn-primary" style="width:100%;margin-top:4px" onclick="doLogin()">로그인</button>
    </div>
    <div id="tab-reg" style="display:none">
      <div class="auth-field"><label>아이디 (2~30자)</label><input id="reg-user" type="text"></div>
      <div class="auth-field"><label>비밀번호 (4자 이상)</label><input id="reg-pw" type="password"></div>
      <button class="btn-primary" style="width:100%;margin-top:4px" onclick="doRegister()">가입</button>
    </div>
    <div class="err" id="auth-err"></div>
  </div>
</div>

<!-- ══════════ HOME ══════════ -->
<div id="page-home" class="page">
  <div class="topnav">
    <span class="topnav-title">📈 차트 연습</span>
    <span class="spacer"></span>
    <span id="home-username" style="color:#787b86;font-size:12px"></span>
    <button class="btn-ghost" style="font-size:12px;padding:4px 10px" onclick="navigate('#history')">기록</button>
    <button class="btn-ghost" style="font-size:12px;padding:4px 10px" onclick="navigate('#settings')">설정</button>
    <button class="btn-ghost" style="font-size:12px;padding:4px 10px" onclick="doLogout()">로그아웃</button>
  </div>
  <div class="scroll-y">
    <div class="home-content">
      <div class="new-btn" onclick="navigate('#setup')">+ 새 세션 시작</div>
      <div class="section-title">최근 세션</div>
      <div id="home-sessions"></div>
      <button class="btn-ghost" style="align-self:flex-start" onclick="navigate('#history')">전체 기록 보기 →</button>
    </div>
  </div>
</div>

<!-- ══════════ SETUP ══════════ -->
<div id="page-setup" class="page">
  <div class="topnav">
    <button class="btn-ghost" style="padding:4px 10px;font-size:12px" onclick="navigate('#home')">← 홈</button>
    <span class="topnav-title">새 세션 설정</span>
  </div>
  <div class="scroll-y">
    <div class="setup-content">
      <div class="setup-row">
        <label>티커 (예: AAPL, 005930.KS)</label>
        <div class="inline-row">
          <input id="s-ticker" type="text" style="width:130px;text-transform:uppercase" placeholder="AAPL">
          <button class="btn-ghost" onclick="setRandomTicker()">🎲 랜덤</button>
          <button class="btn-ghost" onclick="previewData()">데이터 확인</button>
        </div>
      </div>
      <div class="setup-row">
        <label>기간</label>
        <div class="inline-row" style="flex-wrap:wrap">
          <select id="s-period">
            <option value="">직접 지정</option>
            <option value="1mo">1개월</option>
            <option value="3mo">3개월</option>
            <option value="6mo">6개월</option>
            <option value="1y" selected>1년</option>
            <option value="2y">2년</option>
            <option value="5y">5년</option>
            <option value="max">전체</option>
          </select>
          <span style="color:#787b86;font-size:11px">또는</span>
          <input type="date" id="s-start" style="width:130px" placeholder="시작일">
          <span style="color:#787b86">~</span>
          <input type="date" id="s-end" style="width:130px" placeholder="종료일">
        </div>
      </div>
      <div class="setup-row">
        <label>봉 단위</label>
        <select id="s-interval" style="width:100px">
          <option value="1d" selected>일봉</option>
          <option value="1wk">주봉</option>
          <option value="1mo">월봉</option>
          <option value="1h">1시간</option>
        </select>
      </div>
      <div class="setup-row">
        <label>블라인드 시작 시점 (이 시점 이후를 가립니다)</label>
        <div class="blind-opts">
          <select id="s-blind-year" style="width:80px"></select>
          <span style="color:#787b86">년</span>
          <select id="s-blind-month" style="width:66px">
            <option value="01">1월</option><option value="02">2월</option>
            <option value="03">3월</option><option value="04">4월</option>
            <option value="05">5월</option><option value="06">6월</option>
            <option value="07">7월</option><option value="08">8월</option>
            <option value="09">9월</option><option value="10">10월</option>
            <option value="11">11월</option><option value="12">12월</option>
          </select>
          <span style="color:#787b86">월부터</span>
          <button class="btn-ghost" onclick="setRandomBlind()">🎲 랜덤</button>
        </div>
      </div>
      <div id="preview-info">티커 입력 후 '데이터 확인'을 누르세요.</div>
      <div class="err" id="setup-err"></div>
      <button class="btn-primary" style="padding:10px" onclick="startSession()">세션 시작 →</button>
    </div>
  </div>
</div>

<!-- ══════════ PRACTICE ══════════ -->
<div id="page-practice" class="page">
  <div id="practice-header">
    <button class="btn-ghost" style="padding:4px 9px;font-size:12px" onclick="confirmLeave()">← 홈</button>
    <span id="practice-ticker"></span>
    <span id="practice-info"></span>
    <span class="spacer"></span>
    <span id="practice-status"></span>
    <select id="reveal-n" style="width:60px;font-size:12px;padding:3px 5px;background:#2a2e39;color:#d1d4dc;border:1px solid #2a2e39;border-radius:4px">
      <option value="5">5봉</option>
      <option value="10">10봉</option>
      <option value="15">15봉</option>
      <option value="20">20봉</option>
      <option value="30">30봉</option>
      <option value="50">50봉</option>
    </select>
    <button class="btn-ok"     id="btn-reveal"     style="font-size:12px;padding:5px 11px" disabled onclick="handleReveal()">다음 공개</button>
    <button class="btn-danger" id="btn-end-session" style="font-size:12px;padding:5px 11px" onclick="showFinalModal()">세션 종료</button>
  </div>

  <!-- 지표 바 -->
  <div class="bar" id="indicator-bar">
    <span style="color:#787b86;font-size:11px">지표:</span>
    <button class="tog ma5"   data-ind="ma5">MA5</button>
    <button class="tog ma20 on" data-ind="ma20">MA20</button>
    <button class="tog ma60 on" data-ind="ma60">MA60</button>
    <button class="tog ma120"  data-ind="ma120">MA120</button>
    <button class="tog ma200"  data-ind="ma200">MA200</button>
    <button class="tog bb"    data-ind="bb">볼린저</button>
    <button class="tog ichi"  data-ind="ichi">일목</button>
    <div class="sep"></div>
    <button class="tog vol on" data-ind="vol">거래량</button>
    <button class="tog rsi"   data-ind="rsi">RSI</button>
    <button class="tog macd"  data-ind="macd">MACD</button>
    <button class="tog stoch" data-ind="stoch">스토캐스틱</button>
    <button class="tog obv"   data-ind="obv">OBV</button>
  </div>

  <!-- 그리기 바 -->
  <div class="bar">
    <span style="color:#787b86;font-size:11px">그리기:</span>
    <button class="dtool on" data-tool="pointer">포인터</button>
    <button class="dtool"    data-tool="pen">자유</button>
    <button class="dtool"    data-tool="line">추세선</button>
    <button class="dtool"    data-tool="ray">레이</button>
    <button class="dtool"    data-tool="hline">수평선</button>
    <button class="dtool"    data-tool="vline">수직선</button>
    <button class="dtool"    data-tool="rect">사각형</button>
    <button class="dtool"    data-tool="fib">피보나치</button>
    <div class="sep"></div>
    <input type="color" id="draw-color" value="#f4c542">
    <button class="btn-ghost" style="font-size:12px;padding:4px 9px" onclick="undoDraw()">취소</button>
    <button class="btn-ghost" style="font-size:12px;padding:4px 9px" onclick="clearDrawings()">전체삭제</button>
  </div>

  <!-- 차트 영역 -->
  <div id="chart-area">
    <div id="main-wrap">
      <div id="main-chart"></div>
      <canvas id="drawing-overlay"></canvas>
    </div>
    <div class="resize-handle" data-target="sub-rsi"></div>
    <div class="subchart" id="sub-rsi"><span class="subchart-label">RSI(14)</span><div id="chart-rsi" style="width:100%;height:100%"></div></div>
    <div class="resize-handle" data-target="sub-macd"></div>
    <div class="subchart" id="sub-macd"><span class="subchart-label">MACD(12,26,9)</span><div id="chart-macd" style="width:100%;height:100%"></div></div>
    <div class="resize-handle" data-target="sub-stoch"></div>
    <div class="subchart" id="sub-stoch"><span class="subchart-label">Stochastic(14,3)</span><div id="chart-stoch" style="width:100%;height:100%"></div></div>
    <div class="resize-handle" data-target="sub-obv"></div>
    <div class="subchart" id="sub-obv"><span class="subchart-label">OBV</span><div id="chart-obv" style="width:100%;height:100%"></div></div>
  </div>
</div>

<!-- 평가 드로어 -->
<div id="eval-drawer">
  <div id="eval-pre">
    <div class="eval-title">공개 전 예측</div>
    <div class="eval-row">
      <div class="eval-section">
        <label>추세</label>
        <div class="btn-group">
          <button class="eval-btn" data-trend="up">📈 상승</button>
          <button class="eval-btn" data-trend="side">➡ 횡보</button>
          <button class="eval-btn" data-trend="down">📉 하락</button>
        </div>
      </div>
      <div class="eval-section">
        <label>확신도</label>
        <div class="btn-group">
          <button class="eval-btn" data-conf="strong">강한확신</button>
          <button class="eval-btn" data-conf="confident">확신</button>
          <button class="eval-btn" data-conf="uncertain">불확실</button>
          <button class="eval-btn" data-conf="unknown">알수없음</button>
        </div>
      </div>
    </div>
    <div class="eval-section" style="margin-top:8px">
      <label>메모 (선택)</label>
      <textarea id="pre-note" rows="2" style="width:100%;margin-top:4px" placeholder="분석 내용..."></textarea>
    </div>
    <div class="eval-actions">
      <button class="btn-ghost" onclick="closeEvalDrawer()">취소</button>
      <button class="btn-primary" onclick="submitPreEval()">공개하기 →</button>
    </div>
  </div>
  <div id="eval-post" style="display:none">
    <div class="eval-title">결과 평가</div>
    <div id="eval-post-summary" class="eval-section"></div>
    <div class="btn-group">
      <button class="eval-btn" data-post="correct" style="color:#26a69a">✓ 맞음</button>
      <button class="eval-btn" data-post="ambig"   style="color:#ffd54f">~ 모호함</button>
      <button class="eval-btn" data-post="wrong"   style="color:#ef5350">✗ 틀림</button>
    </div>
  </div>
</div>

<!-- 세션 종료 모달 -->

        <h3>비밀번호 변경</h3>

<script>
'use strict';

// ═══════════════════════════════════════════════
// GLOBAL STATE
// ═══════════════════════════════════════════════
let token    = localStorage.getItem('cp_token') || '';
let username = localStorage.getItem('cp_user')  || '';
let settings = {};

let setupData   = null;  // preloaded chart data on setup page
let curSession  = null;  // {id, ticker, name, interval, candles, hide_idx, total, correct, wrong, ambig}
let revealedIdx = 0;
let evalState   = null;  // {trend, conf, note} — filled during pre-eval
let evalPhase   = null;  // 'pre' | 'post'

// session zone markers (for background shading)
let hideTime       = null;  // time of last candle before blind starts
let revealTimes    = [];    // times at each reveal endpoint
const REVEAL_COLORS = ['#26a69a18','#2962ff18','#ab47bc18','#ffd54f18','#ef535018','#80cbc418'];

// chart instances
let mainChart, rsiChart, macdChart, stochChart, obvChart;
let candleSeries, volSeries;
let maSeries = {}, bbSeries = {}, ichiSeries = {};
let rsiLine, rsiOb, rsiOs, macdLine, macdSig, macdHist;
let stochK, stochD, stochOb, stochOs, obvLine;

// sync pause flag — suppresses timescale sync during renderAll
let _syncPaused = false;

// drawing
let drawMode  = 'pointer';
let drawColor = '#f4c542';
let drawings  = [];
let curDraw   = null;
let drawStep  = 0;
let isPen     = false;
let overlay, ctx;

// active indicators
const active = {
  ma5:false, ma20:true, ma60:true, ma120:false, ma200:false,
  bb:false, ichi:false, vol:true, rsi:false, macd:false, stoch:false, obv:false
};

// ═══════════════════════════════════════════════
// API HELPER
// ═══════════════════════════════════════════════
const api = {
  h: () => ({ 'Content-Type':'application/json', 'Authorization':'Bearer '+token }),
  get:   url      => fetch(url, { headers: api.h() }).then(r => r.json()),
  post:  (url, b) => fetch(url, { method:'POST',  headers: api.h(), body: JSON.stringify(b) }).then(r => r.json()),
  patch: (url, b) => fetch(url, { method:'PATCH', headers: api.h(), body: JSON.stringify(b) }).then(r => r.json()),
};

// ═══════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════
const PAGES = ['auth','home','setup','practice','history','detail','settings'];

function showPage(name) {
  PAGES.forEach(p => document.getElementById('page-'+p).classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
}

function navigate(hash) {
  window.location.hash = hash;
}

async function route() {
  if (!token) { showPage('auth'); return; }
  const hash = window.location.hash || '#home';
  if (hash === '#home')       { showPage('home');     loadHome(); }
  else if (hash === '#setup') { showPage('setup');    initSetup(); }
  else if (hash === '#practice') { showPage('practice'); }
  else if (hash === '#history')  { showPage('history'); loadHistory(); }
  else if (hash.startsWith('#detail')) { showPage('detail'); loadDetail(hash); }
  else if (hash === '#settings') { showPage('settings'); loadSettings(); }
  else navigate('#home');
}

window.addEventListener('hashchange', route);

// ═══════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════
function switchTab(tab) {
  document.getElementById('tab-login').style.display = tab==='login' ? 'block':'none';
  document.getElementById('tab-reg').style.display   = tab==='register' ? 'block':'none';
  document.getElementById('tab-login-btn').classList.toggle('on', tab==='login');
  document.getElementById('tab-reg-btn').classList.toggle('on', tab==='register');
  document.getElementById('auth-err').textContent = '';
}

async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pw').value;
  const res = await api.post('/api/login', { username:u, password:p });
  if (res.error) { document.getElementById('auth-err').textContent = res.error; return; }
  token = res.token; username = res.username;
  localStorage.setItem('cp_token', token);
  localStorage.setItem('cp_user', username);
  navigate('#home');
}

async function doRegister() {
  const u = document.getElementById('reg-user').value.trim();
  const p = document.getElementById('reg-pw').value;
  const res = await api.post('/api/register', { username:u, password:p });
  if (res.error) { document.getElementById('auth-err').textContent = res.error; return; }
  token = res.token; username = res.username;
  localStorage.setItem('cp_token', token);
  localStorage.setItem('cp_user', username);
  navigate('#home');
}

function doLogout() {
  token = ''; username = '';
  localStorage.removeItem('cp_token');
  localStorage.removeItem('cp_user');
  navigate('#home');
  route();
}

// ═══════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════
async function loadHome() {
  document.getElementById('home-username').textContent = username + '님';
  const sessions = (await api.get('/api/sessions')).filter(s => s.status !== 'deleted');
  if (!Array.isArray(sessions)) { doLogout(); return; }
  const el = document.getElementById('home-sessions');
  const recent = sessions.slice(0, 5);
  if (!recent.length) {
    el.innerHTML = '<div style="color:#787b86;font-size:12px;padding:10px 0">아직 세션이 없습니다.</div>';
    return;
  }
  el.innerHTML = recent.map(s => sessionCard(s)).join('');
}

function sessionCard(s) {
  const total = s.correct + s.wrong + s.ambig;
  const pct   = total ? Math.round(s.correct / total * 100) : '-';
  const date  = s.created.slice(0,10);
  const badge = s.status === 'active'
    ? '<span class="badge badge-active">진행중</span>'
    : '<span class="badge badge-ended">종료</span>';
  return `<div class="session-card" onclick="navigate('#detail?id=${s.id}')">
    <div class="card-header">
      <span class="card-ticker">${s.ticker}</span>
      <span class="card-meta">${s.interval} · ${s.total}봉</span>
      ${badge}
      <button onclick="event.stopPropagation();deleteSession(${s.id})" style="margin-left:auto;background:none;border:none;color:#787b86;font-size:13px;cursor:pointer;padding:0 2px" title="삭제">✕</button>
    </div>
    <div class="card-stats">
      <span class="stat-correct">✓ ${s.correct}</span>
      <span class="stat-wrong">✗ ${s.wrong}</span>
      <span class="stat-ambig">~ ${s.ambig}</span>
      <span style="color:#d1d4dc">${total ? pct+'% 정답' : '평가 없음'}</span>
      ${s.score ? '<span style="color:#787b86">자기평가 '+s.score+'/10</span>' : ''}
      <span style="color:#787b86;margin-left:auto">${date}</span>
    </div>
  </div>`;
}

async function deleteSession(id) {
  if (!confirm('이 세션을 삭제하시겠어요?')) return;
  await api.patch(`/api/sessions/${id}`, { status: 'deleted' });
  const hash = window.location.hash;
  if (hash === '#home') loadHome();
  else loadHistory();
}

// ═══════════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════════
function initSetup() {
  setupData = null;
  document.getElementById('preview-info').textContent = '티커 입력 후 \'데이터 확인\'을 누르세요.';
  document.getElementById('setup-err').textContent = '';

  // populate blind year select (2000~current+1)
  const yearSel = document.getElementById('s-blind-year');
  yearSel.innerHTML = '';
  const now = new Date().getFullYear();
  for (let y = now + 1; y >= 2000; y--) {
    yearSel.innerHTML += `<option value="${y}">${y}</option>`;
  }
  yearSel.value = String(now);
}

async function previewData() {
  const ticker   = document.getElementById('s-ticker').value.trim().toUpperCase();
  const period   = document.getElementById('s-period').value;
  const start    = document.getElementById('s-start').value;
  const end      = document.getElementById('s-end').value;
  const interval = document.getElementById('s-interval').value;
  if (!ticker) { document.getElementById('setup-err').textContent = '티커를 입력하세요'; return; }

  document.getElementById('preview-info').textContent = '불러오는 중...';
  document.getElementById('setup-err').textContent = '';

  let url = `/api/chart?ticker=${ticker}&interval=${interval}`;
  if (period) url += `&period=${period}`;
  else if (start && end) url += `&start=${start}&end=${end}`;
  else url += `&period=1y`;

  try {
    const data = await fetch(url).then(r => r.json());
    if (data.error) { document.getElementById('preview-info').textContent = '오류: ' + data.error; return; }
    setupData = data;
    const first = new Date(data.candles[0].time * 1000);
    const last  = new Date(data.candles[data.candles.length-1].time * 1000);
    document.getElementById('preview-info').textContent =
      `${data.name} · ${data.candles.length}봉 · ${fmt(first)} ~ ${fmt(last)}`;
    // set blind year/month to middle of data range
    const mid = new Date((data.candles[0].time + data.candles[data.candles.length-1].time) / 2 * 1000);
    document.getElementById('s-blind-year').value  = String(mid.getFullYear());
    document.getElementById('s-blind-month').value = String(mid.getMonth()+1).padStart(2,'0');
  } catch(e) {
    document.getElementById('preview-info').textContent = '오류: ' + e.message;
  }
}

const RANDOM_TICKERS = [
  // 미국 대형주
  'AAPL','MSFT','GOOGL','AMZN','NVDA','META','TSLA','JPM','V','UNH',
  'XOM','JNJ','WMT','MA','PG','HD','CVX','MRK','ABBV','LLY',
  'BAC','KO','PEP','AVGO','COST','TMO','MCD','ABT','ACN','NKE',
  // 미국 ETF
  'SPY','QQQ','IWM','DIA','VTI','GLD','TLT','SOXS','SOXL','ARKK',
  // 한국 주요주
  '005930.KS','000660.KS','035420.KS','005380.KS','051910.KS',
  '006400.KS','035720.KS','028260.KS','105560.KS','055550.KS',
  '003550.KS','066570.KS','207940.KS','000270.KS','096770.KS',
];

function setRandomTicker() {
  const t = RANDOM_TICKERS[Math.floor(Math.random() * RANDOM_TICKERS.length)];
  document.getElementById('s-ticker').value = t;
  setupData = null;
  document.getElementById('preview-info').textContent = `${t} 선택됨. 데이터 확인을 눌러주세요.`;
  document.getElementById('setup-err').textContent = '';
}

async function setRandomBlind() {
  const ticker = document.getElementById('s-ticker').value.trim().toUpperCase();
  if (!ticker) { document.getElementById('setup-err').textContent = '티커를 먼저 입력하세요'; return; }

  const period = document.getElementById('s-period').value;
  const start  = document.getElementById('s-start').value;

  // period/range가 설정되지 않은 경우에만 랜덤 2년 구간 선택
  if (!period && !start) {
    const now     = Date.now();
    const minAgo  = 90  * 86400000;
    const maxAgo  = 10 * 365 * 86400000;
    const endTs   = now - minAgo - Math.random() * (maxAgo - minAgo);
    const startTs = endTs - 2 * 365 * 86400000;
    const toStr   = ts => new Date(ts).toISOString().slice(0, 10);
    document.getElementById('s-start').value  = toStr(startTs);
    document.getElementById('s-end').value    = toStr(endTs);
    document.getElementById('s-period').value = '';
  }

  document.getElementById('preview-info').textContent = '데이터 불러오는 중...';
  await previewData();

  if (!setupData) return;
  // 전체 데이터 중 60~90% 지점에서 랜덤 블라인드 시작
  const n   = setupData.candles.length;
  const idx = Math.floor(n * (0.60 + Math.random() * 0.30));
  const dt  = new Date(setupData.candles[idx].time * 1000);
  document.getElementById('s-blind-year').value  = String(dt.getFullYear());
  document.getElementById('s-blind-month').value = String(dt.getMonth() + 1).padStart(2, '0');
}

async function startSession() {
  if (!setupData) { await previewData(); if (!setupData) return; }
  const blindY = document.getElementById('s-blind-year').value;
  const blindM = document.getElementById('s-blind-month').value;
  const blindTs = new Date(`${blindY}-${blindM}-01`).getTime() / 1000;
  let hide_idx = setupData.candles.findIndex(c => c.time >= blindTs);
  if (hide_idx < 0) hide_idx = Math.floor(setupData.candles.length * 0.8);
  if (hide_idx < 5) hide_idx = 5;

  const res = await api.post('/api/sessions', {
    ticker:   setupData.ticker,
    name:     setupData.name,
    interval: document.getElementById('s-interval').value,
    candles:  setupData.candles,
    hide_idx, total: setupData.candles.length,
  });
  if (res.error) { document.getElementById('setup-err').textContent = res.error; return; }

  curSession = {
    id: res.id,
    ticker: setupData.ticker,
    name: setupData.name,
    interval: document.getElementById('s-interval').value,
    candles: setupData.candles,
    allData: setupData,
    hide_idx,
    total: setupData.candles.length,
    correct: 0, wrong: 0, ambig: 0,
  };
  revealedIdx = hide_idx;
  drawings    = [];
  hideTime    = curSession.candles[hide_idx - 1]?.time ?? null;
  revealTimes = [];
  showPage('practice');
  navigate('#practice');
  requestAnimationFrame(initPractice);
}

// ═══════════════════════════════════════════════
// PRACTICE
// ═══════════════════════════════════════════════
function initPractice() {
  if (!curSession) return;
  document.getElementById('practice-ticker').textContent = curSession.ticker;
  document.getElementById('practice-info').textContent =
    ` · ${curSession.interval} · ${curSession.total}봉`;
  updatePracticeStatus();
  document.getElementById('btn-reveal').disabled = false;
  initCharts();
  renderAll(revealedIdx);
  // fit chart to show exactly from first candle to last revealed candle
  const first = curSession.candles[0];
  const last  = curSession.candles[revealedIdx - 1];
  if (first && last) {
    mainChart.timeScale().setVisibleRange({ from: first.time, to: last.time });
  } else {
    mainChart.timeScale().fitContent();
  }
}

function updatePracticeStatus() {
  if (!curSession) return;
  const { correct, wrong, ambig } = curSession;
  const total = correct + wrong + ambig;
  document.getElementById('practice-status').textContent =
    `${revealedIdx}/${curSession.total}봉 공개` +
    (total ? `  ✓${correct} ✗${wrong} ~${ambig}` : '');
}

function handleReveal() {
  if (!curSession || evalPhase) return;
  if (revealTimes.length >= 10) {
    alert('최대 10번 공개했습니다. 세션을 종료해 주세요.');
    document.getElementById('btn-reveal').disabled = true;
    return;
  }
  // show pre-eval drawer
  evalState = {};
  evalPhase = 'pre';
  document.getElementById('eval-pre').style.display  = 'block';
  document.getElementById('eval-post').style.display = 'none';
  document.querySelectorAll('.eval-btn').forEach(b => b.classList.remove('on','on-ok','on-bad'));
  document.getElementById('pre-note').value = '';
  document.getElementById('eval-drawer').classList.add('open');
}

function closeEvalDrawer() {
  evalPhase = null;
  evalState = null;
  document.getElementById('eval-drawer').classList.remove('open');
}

function submitPreEval() {
  const trend = document.querySelector('.eval-btn[data-trend].on')?.dataset.trend;
  const conf  = document.querySelector('.eval-btn[data-conf].on')?.dataset.conf;
  if (!trend || !conf) { alert('추세와 확신도를 선택하세요'); return; }
  evalState = { trend, conf, note: document.getElementById('pre-note').value };
  // do reveal
  const n = parseInt(document.getElementById('reveal-n').value) || 5;
  revealedIdx = Math.min(revealedIdx + n, curSession.total);
  // track reveal boundary for background shading
  const revealEndCandle = curSession.candles[revealedIdx - 1];
  if (revealEndCandle) revealTimes.push(revealEndCandle.time);
  renderAll(revealedIdx);
  mainChart.timeScale().scrollToRealTime();
  updatePracticeStatus();
  // show post-eval
  evalPhase = 'post';
  document.getElementById('eval-pre').style.display  = 'none';
  document.getElementById('eval-post').style.display = 'block';
  const tMap = { up:'📈 상승', side:'➡ 횡보', down:'📉 하락' };
  const cMap = { strong:'강한확신', confident:'확신', uncertain:'불확실', unknown:'알수없음' };
  document.getElementById('eval-post-summary').textContent =
    `예측: ${tMap[evalState.trend]} / ${cMap[evalState.conf]}`;
  document.querySelectorAll('[data-post]').forEach(b => b.classList.remove('on','on-ok','on-bad'));
  if (revealedIdx >= curSession.total || revealTimes.length >= 10) {
    document.getElementById('btn-reveal').disabled = true;
  }
}

document.querySelectorAll('[data-post]').forEach(btn => {
  btn.addEventListener('click', async () => {
    document.querySelectorAll('[data-post]').forEach(b => b.classList.remove('on','on-ok','on-bad'));
    const ev = btn.dataset.post;
    btn.classList.add(ev === 'correct' ? 'on-ok' : ev === 'wrong' ? 'on-bad' : 'on');
    // save
    if (!curSession) return;
    const res = await api.post(`/api/sessions/${curSession.id}/reveals`, {
      shown: revealedIdx,
      trend: evalState.trend,
      conf:  evalState.conf,
      eval:  ev,
      note:  evalState.note || '',
    });
    if (ev === 'correct') curSession.correct++;
    else if (ev === 'wrong') curSession.wrong++;
    else curSession.ambig++;
    updatePracticeStatus();
    setTimeout(() => {
      closeEvalDrawer();
    }, 600);
  });
});


function showFinalModal() {
  const { correct, wrong, ambig } = curSession;
  const total = correct + wrong + ambig;
  const pct   = total ? Math.round(correct / total * 100) : '-';
  document.getElementById('final-stats-display').innerHTML =
    `정답 <b style="color:#26a69a">${correct}</b> · 틀림 <b style="color:#ef5350">${wrong}</b> · 모호 <b style="color:#ffd54f">${ambig}</b><br>` +
    `정답률: <b>${total ? pct+'%' : '평가 없음'}</b>`;
  document.getElementById('final-note').value  = '';
  document.getElementById('final-score').value = '5';
  document.getElementById('final-modal').classList.add('open');
}

function closeFinalModal() {
  document.getElementById('final-modal').classList.remove('open');
}

async function submitFinalEval() {
  if (!curSession) return;
  const score = parseInt(document.getElementById('final-score').value) || 5;
  const note  = document.getElementById('final-note').value.trim();
  const now   = new Date().toISOString();
  await api.patch(`/api/sessions/${curSession.id}`, {
    status: 'ended', score, note, ended: now,
  });
  closeFinalModal();
  curSession = null;
  navigate('#home');
}

function confirmLeave() {
  if (!curSession) { navigate('#home'); return; }
  if (confirm('세션이 진행 중입니다. 저장하지 않고 나가시겠어요?')) {
    curSession = null;
    navigate('#home');
  }
}

// ═══════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════
async function loadHistory() {
  const sessions = (await api.get('/api/sessions')).filter(s => s.status !== 'deleted');
  const el = document.getElementById('history-list');
  if (!Array.isArray(sessions) || !sessions.length) {
    el.innerHTML = '<div style="color:#787b86;padding:20px">세션 기록이 없습니다.</div>';
    return;
  }
  el.innerHTML = sessions.map(s => sessionCard(s)).join('');
}

// ═══════════════════════════════════════════════

async function loadDetail(hash) {
  const id = parseInt(new URLSearchParams(hash.replace('#detail?','?')).get('id'));
  if (!id) { navigate('#history'); return; }
  const s = await api.get(`/api/sessions/${id}`);
  if (s.error) { navigate('#history'); return; }
  document.getElementById('detail-title').textContent = `${s.ticker} 세션`;
  const total = s.correct + s.wrong + s.ambig;
  const pct   = total ? Math.round(s.correct / total * 100) : '-';
  const el    = document.getElementById('detail-content');
  el.innerHTML = `
    <div class="detail-meta">
      <div class="meta-item"><label>티커</label><span>${s.ticker} (${s.name || ''})</span></div>
      <div class="meta-item"><label>봉 단위</label><span>${s.interval}</span></div>
      <div class="meta-item"><label>총 봉 수</label><span>${s.total}</span></div>
      <div class="meta-item"><label>블라인드 시작</label><span>${s.hide_idx}번째 봉</span></div>
      <div class="meta-item"><label>정답률</label><span style="color:#26a69a">${total ? pct+'%' : '-'}</span></div>
      <div class="meta-item"><label>자기평가</label><span>${s.score ? s.score+'/10' : '-'}</span></div>
      <div class="meta-item"><label>세션 시작</label><span>${s.created.slice(0,10)}</span></div>
      <div class="meta-item"><label>상태</label><span>${s.status === 'active' ? '진행 중' : '종료'}</span></div>
    </div>
    ${s.note ? `<div style="background:#1e222d;border-radius:6px;padding:12px;font-size:13px;color:#d1d4dc"><b>총평:</b><br>${s.note}</div>` : ''}
    <div class="section-title">공개 기록 (${s.reveals.length}회)</div>
    ${s.reveals.length ? s.reveals.map(revealCard).join('') : '<div style="color:#787b86;font-size:12px">공개 기록 없음</div>'}
    ${s.status === 'active' ? `<button class="btn-primary" onclick="resumeSession(${s.id})">이어서 연습</button>` : ''}
  `;
}

function revealCard(r) {
  const tMap = { up:'📈 상승', side:'➡ 횡보', down:'📉 하락' };
  const cMap = { strong:'강한확신', confident:'확신', uncertain:'불확실', unknown:'알수없음' };
  const eMap = { correct:'✓ 맞음', ambig:'~ 모호함', wrong:'✗ 틀림' };
  const cls  = r.eval || '';
  return `<div class="reveal-item ${cls}">
    <div class="reveal-header">
      <span class="reveal-num">${r.num}차 공개</span>
      <div class="reveal-tags">
        ${r.trend ? `<span class="tag">${tMap[r.trend]||r.trend}</span>` : ''}
        ${r.conf  ? `<span class="tag">${cMap[r.conf]||r.conf}</span>` : ''}
        ${r.eval  ? `<span class="tag">${eMap[r.eval]||r.eval}</span>` : ''}
      </div>
    </div>
    ${r.note ? `<div class="reveal-note">${r.note}</div>` : ''}
  </div>`;
}

async function resumeSession(id) {
  const s = await api.get(`/api/sessions/${id}`);
  if (s.error) return;
  curSession = {
    id: s.id, ticker: s.ticker, name: s.name, interval: s.interval,
    candles: s.candles, allData: null,
    hide_idx: s.hide_idx, total: s.total,
    correct: s.correct, wrong: s.wrong, ambig: s.ambig,
  };
  // allData stub — compute indicators from stored candles
  curSession.allData = buildAllData(s.candles);
  revealedIdx = s.candles.length; // resume from where they were (last candle of stored)
  // find last reveal's shown count
  if (s.reveals.length) {
    revealedIdx = s.reveals[s.reveals.length-1].shown;
  } else {
    revealedIdx = s.hide_idx;
  }
  drawings    = [];
  hideTime    = curSession.candles[curSession.hide_idx - 1]?.time ?? null;
  revealTimes = s.reveals.map(r => curSession.candles[r.shown - 1]?.time).filter(Boolean);
  showPage('practice');
  navigate('#practice');
  requestAnimationFrame(initPractice);
}

function syncTime(charts) {
  // one-way: main chart → all subcharts (avoids feedback loops)
  const [main, ...subs] = charts;
  main.timeScale().subscribeVisibleLogicalRangeChange(range => {
    if (_syncPaused || !range) return;
    subs.forEach(tgt => { try { tgt.timeScale().setVisibleLogicalRange(range); } catch(e) {} });
  });
}

function setupChartResize() {
  const ro = new ResizeObserver(() => {
    const mainEl = document.getElementById('main-chart');
    if (mainChart) mainChart.applyOptions({ width:mainEl.clientWidth, height:mainEl.clientHeight });
    ['rsi','macd','stoch','obv'].forEach(k => {
      const el = document.getElementById('chart-'+k);
      const c  = {rsi:rsiChart,macd:macdChart,stoch:stochChart,obv:obvChart}[k];
      if (c && el.parentElement.style.display!=='none')
        c.applyOptions({ width:el.clientWidth, height:el.clientHeight });
    });
    resizeOverlay();
  });
  ro.observe(document.getElementById('main-wrap'));
}

// ── Resize handles ──
let resizeState = null;
function setupResizeHandles() {
  document.querySelectorAll('.resize-handle').forEach(h => {
    h.addEventListener('mousedown', e => {
      const tgt = document.getElementById(h.dataset.target);
      if (!tgt || tgt.style.display==='none') return;
      resizeState = { tgt, startY:e.clientY, startH:tgt.offsetHeight };
      h.classList.add('dragging');
      e.preventDefault();
    });
    h.addEventListener('touchstart', e => {
      const tgt = document.getElementById(h.dataset.target);
      if (!tgt || tgt.style.display==='none') return;
      const t = e.touches[0];
      resizeState = { tgt, startY:t.clientY, startH:tgt.offsetHeight };
      h.classList.add('dragging');
      e.preventDefault();
    }, { passive:false });
  });
  const onMove = (clientY) => {
    if (!resizeState) return;
    const delta = clientY - resizeState.startY;
    const newH  = Math.max(60, resizeState.startH - delta);
    resizeState.tgt.style.height = newH + 'px';
    const chartEl = resizeState.tgt.querySelector('[id^="chart-"]');
    if (chartEl) {
      const c = {rsi:rsiChart,macd:macdChart,stoch:stochChart,obv:obvChart}[chartEl.id.replace('chart-','')];
      if (c) c.applyOptions({ height: newH });
    }
  };
  const onUp = () => {
    if (!resizeState) return;
    document.querySelectorAll('.resize-handle').forEach(h => h.classList.remove('dragging'));
    resizeState = null;
  };
  document.addEventListener('mousemove', e => onMove(e.clientY));
  document.addEventListener('mouseup',   onUp);
  document.addEventListener('touchmove', e => { if(resizeState) { onMove(e.touches[0].clientY); e.preventDefault(); } }, { passive:false });
  document.addEventListener('touchend',  onUp);
}

// ── Render all ──
function renderAll(upTo) {
  _syncPaused = true;
  if (!curSession?.allData || !candleSeries) return;
  const d      = curSession.allData;
  const candles = d.candles.slice(0, upTo);
  if (!candles.length) return;
  const maxTime = candles[candles.length-1].time;

  candleSeries.setData(candles);

  // volume
  if (volSeries) { mainChart.removeSeries(volSeries); volSeries = null; }
  if (active.vol) {
    volSeries = mainChart.addHistogramSeries({ priceFormat:{type:'volume'}, priceScaleId:'vol', lastValueVisible:false });
    mainChart.priceScale('vol').applyOptions({ scaleMargins:{top:0.85,bottom:0} });
    volSeries.setData(candles.map(c => ({ time:c.time, value:c.volume, color: c.close>=c.open?'#f2364544':'#2962ff44' })));
  }

  // MA
  Object.values(maSeries).forEach(s => mainChart.removeSeries(s));
  maSeries = {};
  const maColors = {'5':'#f48024','20':'#26c6da','60':'#ab47bc','120':'#ef5350','200':'#66bb6a'};
  const maPeriods = settings.ma || [5,20,60,120,200];
  maPeriods.forEach((p,i) => {
    const key = 'ma'+p;
    if (!active[key] && !active['ma'+[5,20,60,120,200][i]]) return;
    // check if this period is one of the active ones
    const activeKey = Object.keys(active).find(k => k==='ma'+p && active[k]);
    if (!activeKey) return;
    const s = mainChart.addLineSeries({ color:maColors[String(p)]||'#aaa', lineWidth:1,
      title:'MA'+p, lastValueVisible:true, priceLineVisible:false });
    s.setData(clip(computeMA(d.candles, p), maxTime));
    maSeries[p] = s;
  });

  // Bollinger
  Object.values(bbSeries).forEach(s => mainChart.removeSeries(s));
  bbSeries = {};
  if (active.bb) {
    const bb = computeBB(d.candles);
    bbSeries.up  = mainChart.addLineSeries({ color:'#ffd54f', lineWidth:1, title:'BB上', lastValueVisible:true, priceLineVisible:false });
    bbSeries.mid = mainChart.addLineSeries({ color:'#ffd54f88', lineWidth:1, lineStyle:2, lastValueVisible:false, priceLineVisible:false });
    bbSeries.lo  = mainChart.addLineSeries({ color:'#ffd54f', lineWidth:1, title:'BB下', lastValueVisible:true, priceLineVisible:false });
    bbSeries.up.setData(clip(bb.upper, maxTime));
    bbSeries.mid.setData(clip(bb.mid, maxTime));
    bbSeries.lo.setData(clip(bb.lower, maxTime));
  }

  // Ichimoku
  Object.values(ichiSeries).forEach(s => mainChart.removeSeries(s));
  ichiSeries = {};
  if (active.ichi) {
    const ich = computeIchi(d.candles);
    [['tenkan','#ef5350','전환'],['kijun','#26a69a','기준'],['senkou_a','#80cbc466','선행A'],['senkou_b','#ef535066','선행B'],['chikou','#ba68c8','후행']].forEach(([k,c,t]) => {
      ichiSeries[k] = mainChart.addLineSeries({ color:c, lineWidth:1, title:t, lastValueVisible:true, priceLineVisible:false });
      ichiSeries[k].setData(clip(ich[k], maxTime));
    });
  }

  // RSI
  const subRsi = document.getElementById('sub-rsi');
  if (active.rsi && !subRsi.style.height) subRsi.style.height = '100px';
  subRsi.style.display = active.rsi ? 'block' : 'none';
  if (active.rsi) {
    rsiLine.setData(padToStart(clip(computeRSI(d.candles), maxTime), candles));
    setLevel(rsiOb, rsiOs, candles, 70, 30);
    rsiChart.applyOptions({ width: document.getElementById('chart-rsi').clientWidth, height: subRsi.offsetHeight });
  }

  // MACD
  const subMacd = document.getElementById('sub-macd');
  if (active.macd && !subMacd.style.height) subMacd.style.height = '100px';
  subMacd.style.display = active.macd ? 'block' : 'none';
  if (active.macd) {
    const mac = computeMACD(d.candles);
    macdLine.setData(padToStart(clip(mac.macd, maxTime), candles));
    macdSig.setData(padToStart(clip(mac.signal, maxTime), candles));
    macdHist.setData(padToStart(clip(mac.hist, maxTime), candles)
      .map(v => ({ ...v, color: v.value == null ? 'transparent' : v.value >= 0 ? '#f23645' : '#2962ff' })));
    macdChart.applyOptions({ width: document.getElementById('chart-macd').clientWidth, height: subMacd.offsetHeight });
  }

  // Stochastic
  const subStoch = document.getElementById('sub-stoch');
  if (active.stoch && !subStoch.style.height) subStoch.style.height = '100px';
  subStoch.style.display = active.stoch ? 'block' : 'none';
  if (active.stoch) {
    const st = computeStoch(d.candles);
    stochK.setData(padToStart(clip(st.k, maxTime), candles));
    stochD.setData(padToStart(clip(st.d, maxTime), candles));
    setLevel(stochOb, stochOs, candles, 80, 20);
    stochChart.applyOptions({ width: document.getElementById('chart-stoch').clientWidth, height: subStoch.offsetHeight });
  }

  // OBV
  const subObv = document.getElementById('sub-obv');
  if (active.obv && !subObv.style.height) subObv.style.height = '100px';
  subObv.style.display = active.obv ? 'block' : 'none';
  if (active.obv) {
    obvLine.setData(clip(computeOBV(d.candles), maxTime));
    obvChart.applyOptions({ width: document.getElementById('chart-obv').clientWidth, height: subObv.offsetHeight });
  }

  _syncPaused = false;
  renderDrawings();
}

function clip(arr, maxTime) { return arr.filter(d => d.time <= maxTime); }

// pad indicator data with nulls so it starts at the same time as candles
function padToStart(data, candles) {
  if (!data.length || !candles.length) return data;
  const firstDataTime = data[0].time;
  const padding = candles
    .filter(c => c.time < firstDataTime)
    .map(c => ({ time: c.time, value: null }));
  return padding.length ? [...padding, ...data] : data;
}

function setLevel(s1, s2, candles, v1, v2) {
  if (!candles.length) return;
  const t1 = candles[0].time, t2 = candles[candles.length-1].time;
  s1.setData([{time:t1,value:v1},{time:t2,value:v1}]);
  s2.setData([{time:t1,value:v2},{time:t2,value:v2}]);
}

// ═══════════════════════════════════════════════
// CLIENT-SIDE INDICATOR COMPUTATION
// ═══════════════════════════════════════════════
function computeMA(candles, period) {
  const result = [];
  for (let i = period-1; i < candles.length; i++) {
    let sum = 0;
    for (let j = i-period+1; j <= i; j++) sum += candles[j].close;
    result.push({ time: candles[i].time, value: +(sum/period).toFixed(4) });
  }
  return result;
}

function computeBB(candles, period=20, dev=2) {
  const mid=[], upper=[], lower=[];
  for (let i = period-1; i < candles.length; i++) {
    const slice = candles.slice(i-period+1, i+1).map(c => c.close);
    const mean  = slice.reduce((a,b) => a+b) / period;
    const std   = Math.sqrt(slice.reduce((a,b) => a+(b-mean)**2, 0) / period);
    const t = candles[i].time;
    mid.push({time:t, value:+mean.toFixed(4)});
    upper.push({time:t, value:+(mean+dev*std).toFixed(4)});
    lower.push({time:t, value:+(mean-dev*std).toFixed(4)});
  }
  return {mid, upper, lower};
}

function computeIchi(candles) {
  const result = { tenkan:[], kijun:[], senkou_a:[], senkou_b:[], chikou:[] };
  for (let i = 0; i < candles.length; i++) {
    const hi = (n) => {
      let h = -Infinity;
      for (let j = Math.max(0, i-n+1); j <= i; j++) h = Math.max(h, candles[j].high);
      return h;
    };
    const lo = (n) => {
      let l = Infinity;
      for (let j = Math.max(0, i-n+1); j <= i; j++) l = Math.min(l, candles[j].low);
      return l;
    };
    const t = candles[i].time;
    if (i >= 8)  result.tenkan.push({time:t, value:+((hi(9)+lo(9))/2).toFixed(4)});
    if (i >= 25) result.kijun.push({time:t, value:+((hi(26)+lo(26))/2).toFixed(4)});
    if (i >= 25) {
      const ten = result.tenkan.find(x => x.time === candles[i-26]?.time);
      const kij = result.kijun.find(x => x.time === candles[i-26]?.time);
      if (ten && kij) result.senkou_a.push({time:t, value:+((ten.value+kij.value)/2).toFixed(4)});
    }
    if (i >= 51) result.senkou_b.push({time:t, value:+((hi(52)+lo(52))/2).toFixed(4)});
    if (i + 26 < candles.length) result.chikou.push({time:candles[i+26].time, value:+candles[i].close.toFixed(4)});
  }
  return result;
}

function computeRSI(candles, period=14) {
  const result = [];
  for (let i = period; i < candles.length; i++) {
    let gain=0, loss=0;
    for (let j = i-period+1; j <= i; j++) {
      const d = candles[j].close - candles[j-1].close;
      if (d > 0) gain += d; else loss -= d;
    }
    const rs = gain / (loss || 0.001);
    result.push({ time: candles[i].time, value: +(100 - 100/(1+rs)).toFixed(2) });
  }
  return result;
}

function computeMACD(candles, fast=12, slow=26, sig=9) {
  const closes = candles.map(c => c.close);
  const ema = (data, n) => {
    const k = 2/(n+1), out = [data[0]];
    for (let i = 1; i < data.length; i++) out.push(data[i]*k + out[i-1]*(1-k));
    return out;
  };
  const f = ema(closes, fast), s = ema(closes, slow);
  const macdVals = closes.map((_,i) => f[i]-s[i]);
  const sigVals  = ema(macdVals.slice(slow-1), sig);
  const result   = { macd:[], signal:[], hist:[] };
  for (let i = slow-1; i < candles.length; i++) {
    const t = candles[i].time;
    const m = macdVals[i];
    const sv = sigVals[i-(slow-1)];
    result.macd.push({time:t, value:+m.toFixed(4)});
    result.signal.push({time:t, value:+sv.toFixed(4)});
    result.hist.push({time:t, value:+(m-sv).toFixed(4)});
  }
  return result;
}

function computeStoch(candles, kp=14, dp=3) {
  const k=[], d=[];
  for (let i = kp-1; i < candles.length; i++) {
    const slice = candles.slice(i-kp+1, i+1);
    const lo = Math.min(...slice.map(c => c.low));
    const hi = Math.max(...slice.map(c => c.high));
    k.push({ time:candles[i].time, value: hi===lo ? 50 : +(100*(candles[i].close-lo)/(hi-lo)).toFixed(2) });
  }
  for (let i = dp-1; i < k.length; i++) {
    d.push({ time:k[i].time, value:+(k.slice(i-dp+1,i+1).reduce((a,b) => a+b.value, 0)/dp).toFixed(2) });
  }
  return {k,d};
}

function computeOBV(candles) {
  const result = [];
  let obv = 0;
  for (let i = 0; i < candles.length; i++) {
    if (i > 0) {
      if (candles[i].close > candles[i-1].close) obv += candles[i].volume;
      else if (candles[i].close < candles[i-1].close) obv -= candles[i].volume;
    }
    result.push({ time:candles[i].time, value:obv });
  }
  return result;
}

function buildAllData(candles) {
  return { candles, mas:{}, bollinger:{}, ichimoku:{}, rsi:[], macd:{}, stochastic:{}, obv:[] };
}

// ═══════════════════════════════════════════════

// ═══════════════════════════════════════════════
function initOverlay() {
  overlay = document.getElementById('drawing-overlay');
  ctx     = overlay.getContext('2d');
  resizeOverlay();

  overlay.addEventListener('mousedown',  e => onDown(e.offsetX, e.offsetY, e.button));
  overlay.addEventListener('mousemove',  e => onMove(e.offsetX, e.offsetY));
  overlay.addEventListener('mouseup',    e => onUp(e.offsetX, e.offsetY));
  overlay.addEventListener('touchstart', e => { e.preventDefault(); const p=getTp(e); onDown(p.x,p.y,0); }, {passive:false});
  overlay.addEventListener('touchmove',  e => { e.preventDefault(); const p=getTp(e); onMove(p.x,p.y); }, {passive:false});
  overlay.addEventListener('touchend',   e => { e.preventDefault(); const p=getTp(e); onUp(p.x,p.y); }, {passive:false});

  if (mainChart) {
    mainChart.timeScale().subscribeVisibleLogicalRangeChange(renderDrawings);
    mainChart.subscribeCrosshairMove(renderDrawings);
  }
}

function getTp(e) {
  const t=e.touches[0]||e.changedTouches[0], r=overlay.getBoundingClientRect();
  return { x:t.clientX-r.left, y:t.clientY-r.top };
}

function resizeOverlay() {
  if (!overlay) return;
  const dpr = window.devicePixelRatio || 1;
  const r   = document.getElementById('main-wrap').getBoundingClientRect();
  overlay.width  = r.width  * dpr;
  overlay.height = r.height * dpr;
  overlay.style.width  = r.width  + 'px';
  overlay.style.height = r.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  renderDrawings();
}

function px2chart(x, y) {
  return { time: mainChart?.timeScale().coordinateToTime(x),
           price: candleSeries?.coordinateToPrice(y) };
}
function chart2px(time, price) {
  return { x: time  != null ? mainChart?.timeScale().timeToCoordinate(time)  : null,
           y: price != null ? candleSeries?.priceToCoordinate(price)          : null };
}

function onDown(x, y, btn) {
  if (drawMode === 'pointer') return;
  if (drawMode === 'del') { delNearest(x,y); return; }
  const c = px2chart(x,y);
  if (!c.time && drawMode !== 'hline' && drawMode !== 'pen') return;
  if (drawMode === 'pen') {
    isPen = true; curDraw = { type:'pen', color:drawColor, pts:[c] }; return;
  }
  if (drawMode === 'hline') { drawings.push({type:'hline',color:drawColor,price:c.price}); renderDrawings(); return; }
  if (drawMode === 'vline') { drawings.push({type:'vline',color:drawColor,time:c.time});   renderDrawings(); return; }
  if (drawMode === 'rect')  { curDraw = {type:'rect',color:drawColor,p1:c,p2:c}; return; }
  // 2-click tools
  if (drawStep === 0) { curDraw = {type:drawMode,color:drawColor,p1:c,p2:c}; drawStep=1; }
  else { curDraw.p2 = c; drawings.push({...curDraw}); curDraw=null; drawStep=0; renderDrawings(); }
}

function onMove(x, y) {
  if (!curDraw) return;
  const c = px2chart(x,y);
  if (drawMode === 'pen' && isPen) { curDraw.pts.push(c); }
  else if (c.time != null && c.price != null) { curDraw.p2 = c; }
  renderDrawings();
}

function onUp(x, y) {
  if (!curDraw) return;
  if (drawMode === 'pen') { if(isPen && curDraw.pts.length>1) drawings.push({...curDraw}); isPen=false; curDraw=null; renderDrawings(); return; }
  if (drawMode === 'rect') { const c=px2chart(x,y); if(c.time)curDraw.p2=c; drawings.push({...curDraw}); curDraw=null; drawStep=0; renderDrawings(); }
}

function drawSessionMarkers(w, h) {
  if (!curSession || !mainChart || !hideTime) return;

  const hideX = mainChart.timeScale().timeToCoordinate(hideTime);

  // shade everything from hide start to end as "blind zone" base
  if (hideX != null) {
    ctx.fillStyle = '#ffffff06';
    ctx.fillRect(hideX, 0, w - hideX, h);

    // blue dashed vertical line at blind start
    ctx.save();
    ctx.strokeStyle = '#2962ffaa';
    ctx.lineWidth   = 1.5;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.moveTo(hideX, 0); ctx.lineTo(hideX, h);
    ctx.stroke();
    ctx.restore();

    // label
    ctx.fillStyle = '#2962ffcc';
    ctx.font      = '10px Segoe UI';
    ctx.fillText('블라인드', hideX + 4, 14);
  }

  // shade each reveal segment with alternating color
  const boundaries = [hideTime, ...revealTimes];
  for (let i = 0; i < revealTimes.length; i++) {
    const x1 = mainChart.timeScale().timeToCoordinate(boundaries[i]);
    const x2 = mainChart.timeScale().timeToCoordinate(boundaries[i + 1]);
    if (x1 == null) continue;
    const endX = (x2 != null) ? x2 : w;
    ctx.fillStyle = REVEAL_COLORS[i % REVEAL_COLORS.length];
    ctx.fillRect(x1, 0, endX - x1, h);

    // dashed line at reveal boundary
    ctx.save();
    ctx.strokeStyle = '#ffffff33';
    ctx.lineWidth   = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(x1, 0); ctx.lineTo(x1, h);
    ctx.stroke();
    ctx.restore();

    // reveal number label
    ctx.fillStyle = '#ffffff55';
    ctx.font      = '10px Segoe UI';
    ctx.fillText(`${i+1}차`, x1 + 3, 14);
  }
}

function renderDrawings() {
  if (!ctx || !overlay) return;
  const w=overlay.offsetWidth, h=overlay.offsetHeight;
  ctx.clearRect(0,0,w,h);
  drawSessionMarkers(w, h);
  ctx.font = '11px Segoe UI';
  const all = curDraw ? [...drawings,curDraw] : drawings;
  all.forEach(d => drawShape(d,w,h));
}

function drawShape(d, w, h) {
  ctx.strokeStyle = d.color; ctx.fillStyle = d.color;
  ctx.lineWidth   = 1.5; ctx.setLineDash([]);

  if (d.type === 'pen') {
    if (!d.pts || d.pts.length < 2) return;
    ctx.beginPath();
    d.pts.forEach((pt,i) => {
      if (!pt.time && pt.time !== 0) return;
      const {x,y} = chart2px(pt.time, pt.price);
      if (x==null||y==null) return;
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke(); return;
  }
  if (d.type === 'hline') {
    const {y} = chart2px(null, d.price); if(y==null) return;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
    ctx.fillText(d.price.toFixed(2), 4, y-3); return;
  }
  if (d.type === 'vline') {
    const {x} = {x: mainChart?.timeScale().timeToCoordinate(d.time)}; if(x==null) return;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); return;
  }
  if (d.type === 'line' || d.type === 'ray') {
    const a=chart2px(d.p1.time,d.p1.price), b=chart2px(d.p2.time,d.p2.price);
    if(a.x==null||a.y==null||b.x==null||b.y==null) return;
    ctx.beginPath();
    if (d.type === 'ray') {
      const dx=b.x-a.x, dy=b.y-a.y;
      if(Math.abs(dx)<0.001){ctx.moveTo(a.x,0);ctx.lineTo(a.x,h);}
      else { const t=(w-a.x)/dx; ctx.moveTo(a.x,a.y); ctx.lineTo(a.x+dx*t,a.y+dy*t); }
      ctx.stroke(); ctx.beginPath(); ctx.arc(a.x,a.y,3,0,Math.PI*2); ctx.fill();
    } else {
      const dx=b.x-a.x, dy=b.y-a.y;
      if(Math.abs(dx)<0.001){ctx.moveTo(a.x,0);ctx.lineTo(a.x,h);}
      else { const s=dy/dx; ctx.moveTo(0,a.y-s*a.x); ctx.lineTo(w,a.y+s*(w-a.x)); }
      ctx.stroke();
    }
    return;
  }
  if (d.type === 'rect') {
    const a=chart2px(d.p1.time,d.p1.price), b=chart2px(d.p2.time,d.p2.price);
    if(a.x==null||a.y==null||b.x==null||b.y==null) return;
    const rx=Math.min(a.x,b.x), ry=Math.min(a.y,b.y), rw=Math.abs(b.x-a.x), rh=Math.abs(b.y-a.y);
    ctx.strokeRect(rx,ry,rw,rh);
    ctx.globalAlpha=.07; ctx.fillRect(rx,ry,rw,rh); ctx.globalAlpha=1; return;
  }
  if (d.type === 'fib') {
    const range = d.p2.price - d.p1.price;
    [0,0.236,0.382,0.5,0.618,0.786,1].forEach(r => {
      const price = d.p1.price + range*r;
      const {y}   = chart2px(null, price); if(y==null) return;
      ctx.globalAlpha = (r===0||r===1) ? 1 : .7;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); ctx.globalAlpha=1;
      ctx.fillText(`${(r*100).toFixed(1)}%  ${price.toFixed(2)}`, 4, y-3);
    });
  }
}

function seg2ptDist(px,py,x1,y1,x2,y2) {
  const dx=x2-x1,dy=y2-y1, l2=dx*dx+dy*dy;
  if(!l2) return Math.hypot(px-x1,py-y1);
  const t=Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/l2));
  return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));
}

function delNearest(mx,my) {
  let minD=12, minI=-1;
  drawings.forEach((d,i) => {
    let dist=Infinity;
    if(d.type==='hline'){const{y}=chart2px(null,d.price);if(y!=null)dist=Math.abs(my-y);}
    else if(d.type==='vline'){const x=mainChart?.timeScale().timeToCoordinate(d.time);if(x!=null)dist=Math.abs(mx-x);}
    else if(d.type==='line'||d.type==='ray'){
      const a=chart2px(d.p1.time,d.p1.price),b=chart2px(d.p2.time,d.p2.price);
      if(a.x!=null&&b.x!=null)dist=seg2ptDist(mx,my,a.x,a.y,b.x,b.y);
    }
    else if(d.type==='rect'){
      const a=chart2px(d.p1.time,d.p1.price),b=chart2px(d.p2.time,d.p2.price);
      if(a.x!=null){const cx=Math.max(Math.min(a.x,b.x),Math.min(Math.max(a.x,b.x),mx));
        const cy=Math.max(Math.min(a.y,b.y),Math.min(Math.max(a.y,b.y),my));dist=Math.hypot(mx-cx,my-cy);}
    }
    else if(d.type==='fib'){
      [0,0.236,0.382,0.5,0.618,0.786,1].forEach(r=>{
        const p=d.p1.price+(d.p2.price-d.p1.price)*r;
        const{y}=chart2px(null,p);if(y!=null)dist=Math.min(dist,Math.abs(my-y));
      });
    }
    if(dist<minD){minD=dist;minI=i;}
  });
  if(minI>=0){drawings.splice(minI,1);renderDrawings();}
}

function undoDraw() { if(drawings.length){drawings.pop();renderDrawings();} }
function clearDrawings() { drawings=[];curDraw=null;drawStep=0;renderDrawings(); }

// ═══════════════════════════════════════════════
// EVENT BINDINGS
// ═══════════════════════════════════════════════

// indicator toggles
document.querySelectorAll('.tog').forEach(btn => {
  btn.addEventListener('click', () => {
    const k = btn.dataset.ind;
    active[k] = !active[k];
    btn.classList.toggle('on', active[k]);
    if (curSession) {
      const range = mainChart?.timeScale().getVisibleLogicalRange();
      _syncPaused = true;
      renderAll(revealedIdx);
      _syncPaused = false;
      if (range) mainChart?.timeScale().setVisibleLogicalRange(range);
    }
  });
});

// drawing tools
document.querySelectorAll('.dtool').forEach(btn => {
  btn.addEventListener('click', () => {
    drawMode = btn.dataset.tool; drawStep=0; curDraw=null; isPen=false;
    document.querySelectorAll('.dtool').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    if (overlay) overlay.style.pointerEvents = drawMode==='pointer' ? 'none' : 'auto';
    renderDrawings();
  });
});

document.getElementById('draw-color').addEventListener('input', e => { drawColor = e.target.value; });

// eval buttons
document.querySelectorAll('[data-trend]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-trend]').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
  });
});
document.querySelectorAll('[data-conf]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-conf]').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
  });
});

// enter key for auth
['login-user','login-pw','reg-user','reg-pw'].forEach(id => {
  document.getElementById(id)?.addEventListener('keydown', e => {
    if(e.key==='Enter') { id.startsWith('login') ? doLogin() : doRegister(); }
  });
});

// keyboard shortcuts
document.addEventListener('keydown', e => {
  if(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA') return;
  if(e.key==='Escape')  { curDraw=null;drawStep=0;isPen=false;renderDrawings(); }
  if(e.key==='Delete'||e.key==='Backspace') undoDraw();
});

// setup: period↔date sync
document.getElementById('s-period')?.addEventListener('change', e => {
  if(e.target.value){ document.getElementById('s-start').value=''; document.getElementById('s-end').value=''; }
});
['s-start','s-end'].forEach(id => {
  document.getElementById(id)?.addEventListener('change', () => { document.getElementById('s-period').value=''; });
});

// ═══════════════════════════════════════════════
// UTILITY
// ═══════════════════════════════════════════════
function fmt(d) { return d.toISOString().slice(0,7); }

// ═══════════════════════════════════════════════
// ZOOM PREVENTION
// ═══════════════════════════════════════════════
document.addEventListener('wheel', e => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('touchmove', e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

route();
