<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>차트 연습</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #131722; color: #d1d4dc;
  font-family: 'Segoe UI', sans-serif; font-size: 13px;
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}

/* ── 바 공통 ── */
.bar {
  background: #1e222d; border-bottom: 1px solid #2a2e39;
  padding: 6px 10px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  flex-shrink: 0;
}
.bar:last-child { border-bottom: none; border-top: 1px solid #2a2e39; }
.sep { width: 1px; height: 22px; background: #2a2e39; flex-shrink: 0; }
label { color: #787b86; font-size: 11px; }

input[type=text], input[type=date], input[type=number], select {
  background: #131722; border: 1px solid #2a2e39; color: #d1d4dc;
  padding: 4px 7px; border-radius: 4px; font-size: 12px; outline: none;
}
input[type=text]   { width: 100px; text-transform: uppercase; }
input[type=date]   { width: 130px; color-scheme: dark; }
input[type=number] { width: 60px; }
select { width: 88px; }
input:focus, select:focus { border-color: #2962ff; }

button {
  background: #2962ff; color: #fff; border: none;
  padding: 5px 11px; border-radius: 4px; cursor: pointer; font-size: 12px;
  transition: background .15s; white-space: nowrap;
}
button:hover  { background: #1e4fd8; }
button.ghost  { background: #2a2e39; color: #d1d4dc; }
button.ghost:hover { background: #363b4e; }
button.danger { background: #e53935; } button.danger:hover { background: #c62828; }
button.ok     { background: #26a69a; } button.ok:hover    { background: #1d8078; }

/* ── 지표 토글 ── */
.tog {
  background: #2a2e39; border: 1px solid transparent;
  padding: 3px 9px; border-radius: 3px; cursor: pointer; font-size: 11px;
  color: #787b86; transition: all .15s;
}
.tog.on { border-color: currentColor; }
.tog.ma5   { color: #f48024; } .tog.ma20  { color: #26c6da; }
.tog.ma60  { color: #ab47bc; } .tog.ma120 { color: #ef5350; }
.tog.ma200 { color: #66bb6a; } .tog.bb    { color: #ffd54f; }
.tog.ichi  { color: #80cbc4; } .tog.vol   { color: #90a4ae; }
.tog.rsi   { color: #ff8a65; } .tog.macd  { color: #ce93d8; }
.tog.stoch { color: #80deea; } .tog.obv   { color: #a5d6a7; }

/* ── 그리기 툴바 ── */
.dtool {
  background: #2a2e39; border: 1px solid transparent;
  padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 12px;
  color: #d1d4dc; transition: all .15s;
}
.dtool:hover { background: #363b4e; }
.dtool.on { background: #2962ff; border-color: #2962ff; }
input[type=color] {
  width: 28px; height: 28px; padding: 1px; border-radius: 3px;
  border: 1px solid #2a2e39; cursor: pointer; background: none;
}

/* ── 차트 영역 ── */
#chart-area {
  flex: 1; display: flex; flex-direction: column; min-height: 0; position: relative;
}
#main-wrap { flex: 1; position: relative; min-height: 0; }
#main-chart { width: 100%; height: 100%; }
#drawing-overlay {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
  cursor: crosshair;
}
.subchart { flex-shrink: 0; position: relative; }
.subchart-label {
  position: absolute; top: 4px; left: 8px;
  font-size: 10px; color: #787b86; z-index: 5; pointer-events: none;
}

/* ── 연습 바 ── */
#status-msg { color: #787b86; font-size: 11px; }
</style>
</head>
<body>

<!-- 상단 컨트롤 -->
<div class="bar" id="top-bar">
  <label>티커</label>
  <input type="text" id="ticker" value="AAPL" placeholder="AAPL / 005930.KS">
  <div class="sep"></div>
  <label>시작</label>
  <input type="date" id="date-start">
  <label>종료</label>
  <input type="date" id="date-end">
  <select id="period">
    <option value="">직접지정</option>
    <option value="1mo">1개월</option>
    <option value="3mo">3개월</option>
    <option value="6mo">6개월</option>
    <option value="1y" selected>1년</option>
    <option value="2y">2년</option>
    <option value="5y">5년</option>
    <option value="max">전체</option>
  </select>
  <select id="interval">
    <option value="1d" selected>일봉</option>
    <option value="1wk">주봉</option>
    <option value="1mo">월봉</option>
    <option value="1h">1시간</option>
    <option value="15m">15분</option>
  </select>
  <button id="btn-load">불러오기</button>
</div>

<!-- 지표 토글 -->
<div class="bar" id="indicator-bar">
  <span style="color:#787b86;font-size:11px">지표:</span>
  <button class="tog ma5"   data-ind="ma5">MA5</button>
  <button class="tog ma20 on" data-ind="ma20">MA20</button>
  <button class="tog ma60 on" data-ind="ma60">MA60</button>
  <button class="tog ma120" data-ind="ma120">MA120</button>
  <button class="tog ma200" data-ind="ma200">MA200</button>
  <button class="tog bb"   data-ind="bb">볼린저</button>
  <button class="tog ichi" data-ind="ichi">일목</button>
  <div class="sep"></div>
  <button class="tog vol on" data-ind="vol">거래량</button>
  <button class="tog rsi"   data-ind="rsi">RSI</button>
  <button class="tog macd"  data-ind="macd">MACD</button>
  <button class="tog stoch" data-ind="stoch">스토캐스틱</button>
  <button class="tog obv"   data-ind="obv">OBV</button>
</div>

<!-- 그리기 툴바 -->
<div class="bar" id="drawing-bar">
  <span style="color:#787b86;font-size:11px">그리기:</span>
  <button class="dtool on" data-tool="pointer">포인터</button>
  <button class="dtool"    data-tool="line">추세선</button>
  <button class="dtool"    data-tool="ray">레이</button>
  <button class="dtool"    data-tool="hline">수평선</button>
  <button class="dtool"    data-tool="vline">수직선</button>
  <button class="dtool"    data-tool="rect">사각형</button>
  <button class="dtool"    data-tool="fib">피보나치</button>
  <div class="sep"></div>
  <input type="color" id="draw-color" value="#f4c542" title="선 색상">
  <button class="ghost" id="btn-undo">실행취소</button>
  <button class="ghost" id="btn-clear-draw">전체삭제</button>
</div>

<!-- 차트 영역 -->
<div id="chart-area">
  <div id="main-wrap">
    <div id="main-chart"></div>
    <canvas id="drawing-overlay"></canvas>
  </div>
  <div class="subchart" id="sub-rsi" style="height:110px;display:none">
    <span class="subchart-label">RSI(14)</span>
    <div id="chart-rsi" style="width:100%;height:100%"></div>
  </div>
  <div class="subchart" id="sub-macd" style="height:110px;display:none">
    <span class="subchart-label">MACD(12,26,9)</span>
    <div id="chart-macd" style="width:100%;height:100%"></div>
  </div>
  <div class="subchart" id="sub-stoch" style="height:110px;display:none">
    <span class="subchart-label">Stochastic(14,3)</span>
    <div id="chart-stoch" style="width:100%;height:100%"></div>
  </div>
  <div class="subchart" id="sub-obv" style="height:110px;display:none">
    <span class="subchart-label">OBV</span>
    <div id="chart-obv" style="width:100%;height:100%"></div>
  </div>
</div>

<!-- 연습 바 -->
<div class="bar" id="practice-bar">
  <label>숨김 시작(%)</label>
  <input type="number" id="hide-pct" value="80" min="10" max="95">
  <button class="ghost" id="btn-practice">연습 시작</button>
  <div class="sep"></div>
  <label>공개 봉</label>
  <input type="number" id="reveal-n" value="5" min="1">
  <button class="ok"    id="btn-reveal" disabled>다음 공개</button>
  <button class="danger" id="btn-reveal-all" disabled>전체 공개</button>
  <button class="ghost" id="btn-reset">초기화</button>
  <div class="sep"></div>
  <span id="status-msg">티커를 입력하고 불러오기를 누르세요.</span>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let allData = null;
let revealedIdx = 0;
let practiceMode = false;
let hideCutIdx = 0;

const active = {
  ma5:false, ma20:true, ma60:true, ma120:false, ma200:false,
  bb:false, ichi:false, vol:true, rsi:false, macd:false, stoch:false, obv:false
};

// drawing
let drawMode   = 'pointer';
let drawColor  = '#f4c542';
let drawings   = [];
let curDraw    = null;   // in-progress
let drawStep   = 0;      // 0=waiting p1, 1=waiting p2

// chart instances
let mainChart, rsiChart, macdChart, stochChart, obvChart;
let candleSeries, volSeries;
let maSeries  = {}, bbSeries = {}, ichiSeries = {};
let rsiLine, rsiOb, rsiOs;
let macdLine, macdSig, macdHist;
let stochK, stochD, stochOb, stochOs;
let obvLine;

// canvas
let overlay, ctx, overlayDpr = 1;

// ═══════════════════════════════════════════════
// CHART INIT
// ═══════════════════════════════════════════════
const CHART_OPTS = () => ({
  layout: { background: { color: '#131722' }, textColor: '#787b86' },
  grid:   { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
  crosshair: { mode: 1 },
  timeScale: { timeVisible: true, borderColor: '#2a2e39' },
  rightPriceScale: { borderColor: '#2a2e39' },
  handleScroll: true,
  handleScale: true,
});

function createSubChart(elId) {
  const el = document.getElementById(elId);
  const c  = LightweightCharts.createChart(el, {
    ...CHART_OPTS(),
    width: el.clientWidth,
    height: el.clientHeight,
  });
  return c;
}

function initCharts() {
  const mainEl = document.getElementById('main-chart');
  mainEl.innerHTML = '';
  ['chart-rsi','chart-macd','chart-stoch','chart-obv'].forEach(id => {
    document.getElementById(id).innerHTML = '';
  });

  mainChart = LightweightCharts.createChart(mainEl, {
    ...CHART_OPTS(),
    width: mainEl.clientWidth,
    height: mainEl.clientHeight,
  });

  candleSeries = mainChart.addCandlestickSeries({
    upColor:'#26a69a', downColor:'#ef5350',
    borderUpColor:'#26a69a', borderDownColor:'#ef5350',
    wickUpColor:'#26a69a', wickDownColor:'#ef5350',
  });

  rsiChart   = createSubChart('chart-rsi');
  macdChart  = createSubChart('chart-macd');
  stochChart = createSubChart('chart-stoch');
  obvChart   = createSubChart('chart-obv');

  rsiLine  = rsiChart.addLineSeries({ color:'#ff8a65', lineWidth:1 });
  rsiOb    = rsiChart.addLineSeries({ color:'#ef535088', lineWidth:1, lineStyle:2 });
  rsiOs    = rsiChart.addLineSeries({ color:'#26a69a88', lineWidth:1, lineStyle:2 });

  macdLine = macdChart.addLineSeries({ color:'#ce93d8', lineWidth:1 });
  macdSig  = macdChart.addLineSeries({ color:'#ffeb3b', lineWidth:1 });
  macdHist = macdChart.addHistogramSeries({ color:'#26a69a', priceFormat:{type:'price', precision:4} });

  stochK   = stochChart.addLineSeries({ color:'#80deea', lineWidth:1 });
  stochD   = stochChart.addLineSeries({ color:'#f48024', lineWidth:1 });
  stochOb  = stochChart.addLineSeries({ color:'#ef535066', lineWidth:1, lineStyle:2 });
  stochOs  = stochChart.addLineSeries({ color:'#26a69a66', lineWidth:1, lineStyle:2 });

  obvLine  = obvChart.addLineSeries({ color:'#a5d6a7', lineWidth:1 });

  syncTimeScales([mainChart, rsiChart, macdChart, stochChart, obvChart]);
  initOverlay();
  setupResize();
}

function syncTimeScales(charts) {
  charts.forEach(src => {
    src.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (!range) return;
      charts.forEach(tgt => {
        if (tgt !== src) try { tgt.timeScale().setVisibleLogicalRange(range); } catch(e) {}
      });
    });
  });
}

function setupResize() {
  const mainWrap = document.getElementById('main-wrap');
  const ro = new ResizeObserver(() => {
    const mainEl = document.getElementById('main-chart');
    mainChart.applyOptions({ width: mainEl.clientWidth, height: mainEl.clientHeight });
    ['rsi','macd','stoch','obv'].forEach(k => {
      const el = document.getElementById('chart-' + k);
      if (el.parentElement.style.display !== 'none') {
        const c = {rsi:rsiChart, macd:macdChart, stoch:stochChart, obv:obvChart}[k];
        c.applyOptions({ width: el.clientWidth, height: el.clientHeight });
      }
    });
    resizeOverlay();
  });
  ro.observe(mainWrap);
}

// ═══════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════
async function loadData() {
  const ticker   = document.getElementById('ticker').value.trim().toUpperCase();
  const period   = document.getElementById('period').value;
  const interval = document.getElementById('interval').value;
  const start    = document.getElementById('date-start').value;
  const end      = document.getElementById('date-end').value;

  if (!ticker) return;
  setStatus('불러오는 중...');

  let url = `/api/chart?ticker=${ticker}&interval=${interval}`;
  if (period) {
    url += `&period=${period}`;
  } else if (start && end) {
    url += `&start=${start}&end=${end}`;
  } else {
    url += `&period=1y`;
  }

  try {
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) { setStatus('오류: ' + data.error); return; }

    allData      = data;
    practiceMode = false;
    revealedIdx  = data.candles.length;
    renderAll(revealedIdx);
    mainChart.timeScale().fitContent();
    setStatus(`${data.name} · ${data.candles.length}봉`);
    document.getElementById('btn-reveal').disabled     = true;
    document.getElementById('btn-reveal-all').disabled = true;
  } catch(e) {
    setStatus('오류: ' + e.message);
  }
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderAll(upTo) {
  if (!allData) return;
  const candles = allData.candles.slice(0, upTo);
  if (!candles.length) return;
  const maxTime = candles[candles.length - 1].time;

  candleSeries.setData(candles);

  // 거래량
  if (volSeries) { mainChart.removeSeries(volSeries); volSeries = null; }
  if (active.vol) {
    volSeries = mainChart.addHistogramSeries({
      priceFormat: { type: 'volume' }, priceScaleId: 'vol', color: '#434651',
    });
    mainChart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.85, bottom: 0 } });
    volSeries.setData(candles.map(c => ({
      time: c.time, value: c.volume,
      color: c.close >= c.open ? '#26a69a55' : '#ef535055',
    })));
  }

  // MA
  Object.values(maSeries).forEach(s => mainChart.removeSeries(s));
  maSeries = {};
  const maColors = {'5':'#f48024','20':'#26c6da','60':'#ab47bc','120':'#ef5350','200':'#66bb6a'};
  [5,20,60,120,200].forEach(n => {
    if (!active['ma'+n]) return;
    const s = mainChart.addLineSeries({ color:maColors[n], lineWidth:1, lastValueVisible:false, priceLineVisible:false });
    s.setData(clip(allData.mas[String(n)], maxTime));
    maSeries[n] = s;
  });

  // 볼린저
  Object.values(bbSeries).forEach(s => mainChart.removeSeries(s));
  bbSeries = {};
  if (active.bb) {
    const bb = allData.bollinger;
    bbSeries.up  = addLine(mainChart, '#ffd54f', 1, false);
    bbSeries.mid = addLine(mainChart, '#ffd54f66', 1, false, 2);
    bbSeries.lo  = addLine(mainChart, '#ffd54f', 1, false);
    bbSeries.up.setData(clip(bb.upper, maxTime));
    bbSeries.mid.setData(clip(bb.mid, maxTime));
    bbSeries.lo.setData(clip(bb.lower, maxTime));
  }

  // 일목
  Object.values(ichiSeries).forEach(s => mainChart.removeSeries(s));
  ichiSeries = {};
  if (active.ichi) {
    const colors = {tenkan:'#ef5350', kijun:'#26a69a', senkou_a:'#80cbc466', senkou_b:'#ef535066', chikou:'#ba68c8'};
    Object.entries(colors).forEach(([k, c]) => {
      ichiSeries[k] = addLine(mainChart, c, 1, false);
      ichiSeries[k].setData(clip(allData.ichimoku[k], maxTime));
    });
  }

  // RSI
  toggleSub('sub-rsi', active.rsi, rsiChart, 'chart-rsi');
  if (active.rsi) {
    const d = clip(allData.rsi, maxTime);
    rsiLine.setData(d);
    setLevelLines(rsiOb, rsiOs, d, 70, 30);
  }

  // MACD
  toggleSub('sub-macd', active.macd, macdChart, 'chart-macd');
  if (active.macd) {
    macdLine.setData(clip(allData.macd.macd, maxTime));
    macdSig.setData(clip(allData.macd.signal, maxTime));
    macdHist.setData(clip(allData.macd.histogram, maxTime).map(d => ({
      ...d, color: d.value >= 0 ? '#26a69a' : '#ef5350',
    })));
  }

  // Stochastic
  toggleSub('sub-stoch', active.stoch, stochChart, 'chart-stoch');
  if (active.stoch) {
    const dk = clip(allData.stochastic.k, maxTime);
    const dd = clip(allData.stochastic.d, maxTime);
    stochK.setData(dk);
    stochD.setData(dd);
    setLevelLines(stochOb, stochOs, dk, 80, 20);
  }

  // OBV
  toggleSub('sub-obv', active.obv, obvChart, 'chart-obv');
  if (active.obv) {
    obvLine.setData(clip(allData.obv, maxTime));
  }

  renderDrawings();
}

function clip(arr, maxTime) {
  return arr.filter(d => d.time <= maxTime);
}

function addLine(chart, color, lineWidth=1, lastValue=false, lineStyle=0) {
  return chart.addLineSeries({ color, lineWidth, lastValueVisible: lastValue, priceLineVisible: false, lineStyle });
}

function setLevelLines(obSeries, osSeries, data, obLevel, osLevel) {
  if (!data.length) return;
  const t1 = data[0].time, t2 = data[data.length-1].time;
  obSeries.setData([{time:t1,value:obLevel},{time:t2,value:obLevel}]);
  osSeries.setData([{time:t1,value:osLevel},{time:t2,value:osLevel}]);
}

function toggleSub(subId, show, chart, chartElId) {
  const subEl   = document.getElementById(subId);
  const chartEl = document.getElementById(chartElId);
  subEl.style.display = show ? 'block' : 'none';
  if (show) {
    requestAnimationFrame(() => {
      chart.applyOptions({ width: chartEl.clientWidth, height: chartEl.clientHeight });
    });
  }
}

// ═══════════════════════════════════════════════
// DRAWING TOOLS
// ═══════════════════════════════════════════════
function initOverlay() {
  overlay = document.getElementById('drawing-overlay');
  ctx     = overlay.getContext('2d');
  resizeOverlay();

  overlay.addEventListener('mousedown',  e => onPtrDown(e.offsetX, e.offsetY, e.button));
  overlay.addEventListener('mousemove',  e => onPtrMove(e.offsetX, e.offsetY));
  overlay.addEventListener('mouseup',    e => onPtrUp(e.offsetX, e.offsetY));

  overlay.addEventListener('touchstart', e => {
    if (drawMode === 'pointer') return;
    e.preventDefault();
    const pt = getTouchPt(e);
    onPtrDown(pt.x, pt.y, 0);
  }, { passive: false });
  overlay.addEventListener('touchmove', e => {
    if (drawMode === 'pointer' || !curDraw) return;
    e.preventDefault();
    const pt = getTouchPt(e);
    onPtrMove(pt.x, pt.y);
  }, { passive: false });
  overlay.addEventListener('touchend', e => {
    if (drawMode === 'pointer') return;
    e.preventDefault();
    const pt = getTouchPt(e);
    onPtrUp(pt.x, pt.y);
  }, { passive: false });

  mainChart.timeScale().subscribeVisibleLogicalRangeChange(() => renderDrawings());
  mainChart.subscribeCrosshairMove(() => renderDrawings());
}

function getTouchPt(e) {
  const t    = e.touches[0] || e.changedTouches[0];
  const rect = overlay.getBoundingClientRect();
  return { x: t.clientX - rect.left, y: t.clientY - rect.top };
}

function resizeOverlay() {
  const dpr  = window.devicePixelRatio || 1;
  const rect = document.getElementById('main-wrap').getBoundingClientRect();
  overlayDpr = dpr;
  overlay.width  = rect.width  * dpr;
  overlay.height = rect.height * dpr;
  overlay.style.width  = rect.width  + 'px';
  overlay.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  renderDrawings();
}

// px → price/time
function toChartCoords(x, y) {
  const time  = mainChart.timeScale().coordinateToTime(x);
  const price = candleSeries.coordinateToPrice(y);
  return { time, price };
}
// price/time → px
function toPx(time, price) {
  const x = mainChart.timeScale().timeToCoordinate(time);
  const y = candleSeries.priceToCoordinate(price);
  return { x, y };
}

function onPtrDown(x, y, btn) {
  if (drawMode === 'pointer') return;

  if (drawMode === 'del') {
    deleteNearest(x, y);
    return;
  }

  const coords = toChartCoords(x, y);
  if (coords.time == null || coords.price == null) return;

  if (drawMode === 'hline') {
    drawings.push({ type:'hline', color:drawColor, price:coords.price });
    renderDrawings();
    return;
  }
  if (drawMode === 'vline') {
    drawings.push({ type:'vline', color:drawColor, time:coords.time });
    renderDrawings();
    return;
  }
  if (drawMode === 'rect') {
    curDraw = { type:'rect', color:drawColor, p1:coords, p2:coords };
    return;
  }
  // line, ray, fib: 2-click
  if (drawStep === 0) {
    curDraw  = { type:drawMode, color:drawColor, p1:coords, p2:coords };
    drawStep = 1;
  } else {
    curDraw.p2 = coords;
    drawings.push({ ...curDraw });
    curDraw  = null;
    drawStep = 0;
    renderDrawings();
  }
}

function onPtrMove(x, y) {
  if (!curDraw) return;
  const coords = toChartCoords(x, y);
  if (coords.time != null && coords.price != null) {
    curDraw.p2 = coords;
  }
  renderDrawings();
}

function onPtrUp(x, y) {
  if (!curDraw || curDraw.type !== 'rect') return;
  const coords = toChartCoords(x, y);
  if (coords.time != null && coords.price != null) curDraw.p2 = coords;
  drawings.push({ ...curDraw });
  curDraw  = null;
  drawStep = 0;
  renderDrawings();
}

function renderDrawings() {
  if (!ctx) return;
  const w = overlay.offsetWidth;
  const h = overlay.offsetHeight;
  ctx.clearRect(0, 0, w, h);

  const all = curDraw ? [...drawings, curDraw] : drawings;
  ctx.font = '11px Segoe UI';

  all.forEach(d => drawShape(d, w, h));
}

function drawShape(d, w, h) {
  ctx.strokeStyle = d.color;
  ctx.fillStyle   = d.color;
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([]);

  if (d.type === 'hline') {
    const { y } = toPx(null, d.price);
    if (y == null) return;
    ctx.beginPath();
    ctx.moveTo(0, y); ctx.lineTo(w, y);
    ctx.stroke();
    ctx.fillText(d.price.toFixed(2), 4, y - 3);
  }
  else if (d.type === 'vline') {
    const { x } = toPxTime(d.time);
    if (x == null) return;
    ctx.beginPath();
    ctx.moveTo(x, 0); ctx.lineTo(x, h);
    ctx.stroke();
  }
  else if (d.type === 'line' || d.type === 'ray') {
    const a = toPx(d.p1.time, d.p1.price);
    const b = toPx(d.p2.time, d.p2.price);
    if (a.x == null || a.y == null || b.x == null || b.y == null) return;

    if (d.type === 'line') {
      // extend both directions to canvas bounds
      const pts = extendToBounds(a.x, a.y, b.x, b.y, w, h);
      ctx.beginPath();
      ctx.moveTo(pts[0], pts[1]); ctx.lineTo(pts[2], pts[3]);
      ctx.stroke();
    } else {
      // ray: from p1 extending through p2 to right edge
      const dx = b.x - a.x, dy = b.y - a.y;
      if (Math.abs(dx) < 0.001) {
        ctx.beginPath(); ctx.moveTo(a.x, 0); ctx.lineTo(a.x, h); ctx.stroke();
      } else {
        const t = (w - a.x) / dx;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y); ctx.lineTo(a.x + dx*t, a.y + dy*t);
        ctx.stroke();
        // dot at p1
        ctx.beginPath(); ctx.arc(a.x, a.y, 3, 0, Math.PI*2); ctx.fill();
      }
    }
  }
  else if (d.type === 'rect') {
    const a = toPx(d.p1.time, d.p1.price);
    const b = toPx(d.p2.time, d.p2.price);
    if (a.x==null||a.y==null||b.x==null||b.y==null) return;
    const rx = Math.min(a.x,b.x), ry = Math.min(a.y,b.y);
    const rw = Math.abs(b.x-a.x), rh = Math.abs(b.y-a.y);
    ctx.strokeRect(rx, ry, rw, rh);
    ctx.globalAlpha = 0.06;
    ctx.fillRect(rx, ry, rw, rh);
    ctx.globalAlpha = 1;
  }
  else if (d.type === 'fib') {
    const p1Price = d.p1.price, p2Price = d.p2.price;
    const ratios  = [0, 0.236, 0.382, 0.5, 0.618, 0.786, 1.0];
    const range   = p2Price - p1Price;
    ratios.forEach(r => {
      const price = p1Price + range * r;
      const { y }  = toPx(null, price);
      if (y == null) return;
      ctx.globalAlpha = r===0||r===1 ? 1 : 0.75;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillText(`${(r*100).toFixed(1)}%  ${price.toFixed(2)}`, 4, y - 3);
    });
  }
}

// toPx but only time coord (for vline)
function toPxTime(time) {
  return { x: mainChart.timeScale().timeToCoordinate(time) };
}

// toPx but only price coord (for hline, fib)
function toPx(time, price) {
  return {
    x: time  != null ? mainChart.timeScale().timeToCoordinate(time) : null,
    y: price != null ? candleSeries.priceToCoordinate(price)        : null,
  };
}

function extendToBounds(x1, y1, x2, y2, w, h) {
  const dx = x2 - x1, dy = y2 - y1;
  if (Math.abs(dx) < 0.001) return [x1, 0, x1, h];
  const slope = dy / dx;
  // at x=0: y = y1 - slope*x1; at x=w: y = y1 + slope*(w-x1)
  return [0, y1 - slope*x1, w, y1 + slope*(w-x1)];
}

function ptToSegDist(px, py, x1, y1, x2, y2) {
  const dx=x2-x1, dy=y2-y1;
  const len2 = dx*dx + dy*dy;
  if (len2 === 0) return Math.hypot(px-x1, py-y1);
  const t = Math.max(0, Math.min(1, ((px-x1)*dx+(py-y1)*dy)/len2));
  return Math.hypot(px - (x1+t*dx), py - (y1+t*dy));
}

function deleteNearest(mx, my) {
  let minDist = 12, minIdx = -1;
  drawings.forEach((d, i) => {
    let dist = Infinity;
    if (d.type === 'hline') {
      const { y } = toPx(null, d.price);
      if (y != null) dist = Math.abs(my - y);
    } else if (d.type === 'vline') {
      const { x } = toPxTime(d.time);
      if (x != null) dist = Math.abs(mx - x);
    } else if (d.type === 'line' || d.type === 'ray') {
      const a = toPx(d.p1.time, d.p1.price);
      const b = toPx(d.p2.time, d.p2.price);
      if (a.x!=null && b.x!=null) dist = ptToSegDist(mx, my, a.x, a.y, b.x, b.y);
    } else if (d.type === 'rect') {
      const a = toPx(d.p1.time, d.p1.price);
      const b = toPx(d.p2.time, d.p2.price);
      if (a.x!=null && b.x!=null) {
        const rx=Math.min(a.x,b.x), ry=Math.min(a.y,b.y);
        const rw=Math.abs(b.x-a.x), rh=Math.abs(b.y-a.y);
        const cx = Math.max(rx, Math.min(rx+rw, mx));
        const cy = Math.max(ry, Math.min(ry+rh, my));
        dist = Math.hypot(mx-cx, my-cy);
      }
    } else if (d.type === 'fib') {
      [0, 0.236, 0.382, 0.5, 0.618, 0.786, 1.0].forEach(r => {
        const price = d.p1.price + (d.p2.price - d.p1.price) * r;
        const { y } = toPx(null, price);
        if (y != null) dist = Math.min(dist, Math.abs(my - y));
      });
    }
    if (dist < minDist) { minDist = dist; minIdx = i; }
  });
  if (minIdx >= 0) {
    drawings.splice(minIdx, 1);
    renderDrawings();
  }
}

// ═══════════════════════════════════════════════
// PRACTICE MODE
// ═══════════════════════════════════════════════
function startPractice() {
  if (!allData) { setStatus('먼저 데이터를 불러오세요.'); return; }
  const pct = parseInt(document.getElementById('hide-pct').value) || 80;
  hideCutIdx   = Math.floor(allData.candles.length * pct / 100);
  revealedIdx  = hideCutIdx;
  practiceMode = true;
  renderAll(revealedIdx);
  mainChart.timeScale().fitContent();
  setStatus(`연습 모드 — ${revealedIdx} / ${allData.candles.length}봉 표시`);
  document.getElementById('btn-reveal').disabled     = false;
  document.getElementById('btn-reveal-all').disabled = false;
}

function revealNext() {
  if (!practiceMode || !allData) return;
  const n    = parseInt(document.getElementById('reveal-n').value) || 5;
  revealedIdx = Math.min(revealedIdx + n, allData.candles.length);
  renderAll(revealedIdx);
  mainChart.timeScale().scrollToRealTime();
  setStatus(`${revealedIdx} / ${allData.candles.length}봉 공개`);
  if (revealedIdx >= allData.candles.length) {
    setStatus('전체 공개 완료');
    document.getElementById('btn-reveal').disabled = true;
  }
}

function revealAll() {
  if (!allData) return;
  revealedIdx = allData.candles.length;
  renderAll(revealedIdx);
  mainChart.timeScale().fitContent();
  setStatus('전체 공개 완료');
  document.getElementById('btn-reveal').disabled     = true;
  document.getElementById('btn-reveal-all').disabled = true;
}

function resetPractice() {
  if (!allData) return;
  practiceMode = false;
  revealedIdx  = allData.candles.length;
  renderAll(revealedIdx);
  mainChart.timeScale().fitContent();
  setStatus(`${allData.name} · ${allData.candles.length}봉`);
  document.getElementById('btn-reveal').disabled     = true;
  document.getElementById('btn-reveal-all').disabled = true;
}

// ═══════════════════════════════════════════════
// EVENT BINDINGS
// ═══════════════════════════════════════════════
function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }

// 지표 토글
document.querySelectorAll('.tog').forEach(btn => {
  btn.addEventListener('click', () => {
    const k = btn.dataset.ind;
    active[k] = !active[k];
    btn.classList.toggle('on', active[k]);
    if (allData) renderAll(revealedIdx);
  });
});

// 그리기 툴
document.querySelectorAll('.dtool').forEach(btn => {
  btn.addEventListener('click', () => {
    drawMode = btn.dataset.tool;
    drawStep = 0;
    curDraw  = null;
    document.querySelectorAll('.dtool').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    // overlay captures events only when a drawing tool is active
    overlay.style.pointerEvents = drawMode === 'pointer' ? 'none' : 'auto';
    renderDrawings();
  });
});

document.getElementById('draw-color').addEventListener('input', e => {
  drawColor = e.target.value;
});

document.getElementById('btn-undo').addEventListener('click', () => {
  if (drawings.length) { drawings.pop(); renderDrawings(); }
});
document.getElementById('btn-clear-draw').addEventListener('click', () => {
  drawings = []; curDraw = null; drawStep = 0; renderDrawings();
});

// 날짜↔기간 연동
document.getElementById('period').addEventListener('change', e => {
  if (e.target.value) {
    document.getElementById('date-start').value = '';
    document.getElementById('date-end').value   = '';
  }
});
document.getElementById('date-start').addEventListener('change', () => {
  document.getElementById('period').value = '';
});
document.getElementById('date-end').addEventListener('change', () => {
  document.getElementById('period').value = '';
});

// 불러오기
document.getElementById('btn-load').addEventListener('click', loadData);
document.getElementById('ticker').addEventListener('keydown', e => { if (e.key === 'Enter') loadData(); });

// 연습
document.getElementById('btn-practice').addEventListener('click', startPractice);
document.getElementById('btn-reveal').addEventListener('click', revealNext);
document.getElementById('btn-reveal-all').addEventListener('click', revealAll);
document.getElementById('btn-reset').addEventListener('click', resetPractice);

// ESC: 그리기 취소
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    curDraw = null; drawStep = 0; renderDrawings();
  }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (drawings.length) { drawings.pop(); renderDrawings(); }
  }
});

// ═══════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════
initCharts();
loadData();
</script>
</body>
</html>
